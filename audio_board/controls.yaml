switch:
  - platform: gpio
    id: amp_enable
    name: Amplifier
    icon: "mdi:speaker"
    entity_category: config
    pin:
      tca9555: board_ioexp
      number: 8
      inverted: false
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: master_mute_switch
    name: Mute
    icon: "mdi:microphone-off"
    optimistic: false
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - script.execute:
          id: play_sound
          priority: false
          sound_uri: "audio-file://mute_switch_on_sound"
      - micro_wake_word.stop:
      - voice_assistant.stop:
      - script.execute: control_leds
    turn_off_action:
      - script.execute:
          id: play_sound
          priority: false
          sound_uri: "audio-file://mute_switch_off_sound"
      - micro_wake_word.start:
      - script.execute: control_leds

  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      - micro_wake_word.disable_model: stop
      - if:
          condition:
            media_player.is_announcing: external_media_player
          then:
            media_player.stop:
              id: external_media_player
              announcement: true
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 0
          duration: 1.0s
      - script.execute: control_leds
    on_turn_on:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
      - micro_wake_word.enable_model: stop
      - script.execute:
          id: play_sound
          priority: true
          sound_uri: "audio-file://timer_finished_sound"
      - script.execute: control_leds
      - delay: 15min
      - switch.turn_off: timer_ringing

button:
  - platform: restart
    id: restart_button
    name: Restart
    entity_category: config
    disabled_by_default: true
    icon: "mdi:restart"

script:
  - id: control_leds
    mode: restart
    then:
      - lambda: |-
          auto set_leds = [](const char *effect, float r, float g, float b, float brightness) {
            auto call = id(voice_assistant_leds).turn_on();
            call.set_brightness(brightness);
            call.set_rgb(r, g, b);
            call.set_effect(effect);
            call.perform();
          };

          float base_r = id(led_ring).current_values.get_red();
          float base_g = id(led_ring).current_values.get_green();
          float base_b = id(led_ring).current_values.get_blue();
          float brightness = id(led_ring).current_values.get_brightness();
          if (brightness < 0.2f) {
            brightness = 0.66f;
          }
          if (!id(led_ring).current_values.get_state()) {
            base_r = 0.094f;
            base_g = 0.733f;
            base_b = 0.949f;
          }

          if (id(init_in_progress)) {
            set_leds("Twinkle", 0.094f, 0.733f, 0.949f, 0.66f);
            return;
          }

          if (!id(wifi_id).is_connected() || !id(api_id).is_connected()) {
            set_leds("Twinkle", 1.0f, 0.0f, 0.0f, 0.66f);
            return;
          }

          if (id(timer_ringing).state) {
            set_leds("Listening For Command", 0.6f, 0.0f, 0.6f, 0.85f);
            return;
          }

          switch (id(voice_assistant_phase)) {
            case 2:
              set_leds("Waiting for Command", base_r, base_g, base_b, brightness);
              return;
            case 3:
              set_leds("Listening For Command", base_r, base_g, base_b, brightness);
              return;
            case 4:
              set_leds("Thinking", base_r, base_g, base_b, brightness);
              return;
            case 5:
              set_leds("Twinkle", base_r, base_g, base_b, brightness);
              return;
            case 6:
              set_leds("Tool Call", base_r, base_g, base_b, brightness);
              return;
            case 10:
              set_leds("Twinkle", 1.0f, 0.0f, 0.0f, 0.66f);
              return;
            case 11:
              set_leds("Listening For Command", 1.0f, 0.0f, 0.0f, 0.85f);
              return;
            default:
              break;
          }

          if (id(master_mute_switch).state ||
              id(external_media_player).volume == 0.0f ||
              id(external_media_player).is_muted()) {
            set_leds("Muted or Silent", base_r, base_g, base_b, brightness);
            return;
          }

          auto off_call = id(voice_assistant_leds).turn_off();
          off_call.perform();
          if (id(led_ring).current_values.get_state()) {
            auto call = id(led_ring).turn_on();
            call.perform();
          }

  - id: control_leds_volume_changed
    mode: restart
    then:
      - lambda: |-
          auto call = id(voice_assistant_leds).turn_on();
          float brightness = id(led_ring).current_values.get_brightness();
          if (brightness < 0.2f) {
            brightness = 0.66f;
          }
          call.set_brightness(brightness);
          call.set_rgb(0.094f, 0.733f, 0.949f);
          call.set_effect("Volume Display");
          call.perform();
      - delay: 1.2s
      - script.execute: control_leds

  - id: play_sound
    parameters:
      priority: bool
      sound_uri: string
    then:
      - if:
          condition:
            lambda: return priority;
          then:
            - media_player.stop:
                id: external_media_player
                announcement: true
      - if:
          condition:
            or:
              - lambda: return priority;
              - not:
                  media_player.is_announcing: external_media_player
          then:
            - media_player.play_media:
                id: external_media_player
                media_url: !lambda return sound_uri;
                announcement: true
