globals:
  - id: global_led_animation_index
    type: int
    restore_value: no
    initial_value: "0"

light:
  - platform: esp32_rmt_led_strip
    id: hw_led_ring
    pin: GPIO38
    num_leds: ${led_num}
    rgb_order: RGB
    chipset: WS2812
    default_transition_length: 0ms

  - platform: partition
    id: led_ring
    name: LED Ring
    entity_category: config
    icon: "mdi:dots-circle"
    default_transition_length: 0ms
    restore_mode: RESTORE_DEFAULT_OFF
    initial_state:
      color_mode: rgb
      brightness: 66%
      red: 9.4%
      green: 73.3%
      blue: 94.9%
    segments:
      - id: hw_led_ring
        from: 0
        to: 6

  - platform: partition
    id: voice_assistant_leds
    internal: true
    default_transition_length: 0ms
    segments:
      - id: hw_led_ring
        from: 0
        to: 6
    effects:
      - addressable_lambda:
          name: "Waiting for Command"
          update_interval: 200ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                        light_color.get_blue() * 255);
            for (int i = 0; i < it.size(); i++) {
              it[i] = color;
            }
      - addressable_lambda:
          name: "Listening For Command"
          update_interval: 200ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                        light_color.get_blue() * 255);
            for (int i = 0; i < it.size(); i++) {
              it[i] = color;
            }
      - addressable_lambda:
          name: "Thinking"
          update_interval: 250ms
          lambda: |-
            static bool flash_on = true;
            if (initial_run) {
              flash_on = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                        light_color.get_blue() * 255);
            for (int i = 0; i < it.size(); i++) {
              it[i] = flash_on ? color : Color::BLACK;
            }
            flash_on = !flash_on;
      - addressable_lambda:
          name: "Tool Call"
          update_interval: 80ms
          lambda: |-
            static bool moving_forward = true;
            if (initial_run) {
              id(global_led_animation_index) = 0;
              moving_forward = true;
            }
            const int count = it.size();
            const int max_step = count / 2;
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                        light_color.get_blue() * 255);
            int lead_a = id(global_led_animation_index);
            int lead_b = (count - 1 - lead_a + count) % count;
            int trail_a = moving_forward ? (count + lead_a - 1) % count : (lead_a + 1) % count;
            int trail_b = moving_forward ? (lead_b + 1) % count : (count + lead_b - 1) % count;
            int tail_a = moving_forward ? (count + lead_a - 2) % count : (lead_a + 2) % count;
            int tail_b = moving_forward ? (lead_b + 2) % count : (count + lead_b - 2) % count;
            for (int i = 0; i < count; i++) {
              if (i == lead_a || i == lead_b) {
                it[i] = color;
              } else if (i == trail_a || i == trail_b) {
                it[i] = color * 192;
              } else if (i == tail_a || i == tail_b) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (moving_forward) {
              if (id(global_led_animation_index) >= max_step) {
                id(global_led_animation_index) = max_step > 0 ? max_step - 1 : 0;
                moving_forward = false;
              } else {
                id(global_led_animation_index) += 1;
              }
            } else {
              if (id(global_led_animation_index) <= 0) {
                id(global_led_animation_index) = max_step > 0 ? 1 : 0;
                moving_forward = true;
              } else {
                id(global_led_animation_index) -= 1;
              }
            }
      - addressable_lambda:
          name: "Replying"
          update_interval: 55ms
          lambda: |-
            const int count = it.size();
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                        light_color.get_blue() * 255);
            id(global_led_animation_index) = (count + id(global_led_animation_index) - 1) % count;
            const int lead = id(global_led_animation_index) % count;
            for (int i = 0; i < count; i++) {
              if (i == lead) {
                it[i] = color;
              } else if (i == (lead + 1) % count) {
                it[i] = color * 170;
              } else if (i == (lead + 2) % count) {
                it[i] = color * 90;
              } else {
                it[i] = Color::BLACK;
              }
            }
      - addressable_lambda:
          name: "Muted or Silent"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color base(light_color.get_red() * 255, light_color.get_green() * 255,
                       light_color.get_blue() * 255);
            Color muted(255, 0, 0);
            for (int i = 0; i < it.size(); i++) {
              it[i] = light_color.get_state() ? base : Color::BLACK;
            }
            if (id(master_mute_switch).state) {
              it[0] = muted;
              it[3] = muted;
            }
            if (id(external_media_player).volume == 0.0f || id(external_media_player).is_muted()) {
              it[5] = muted;
            }
      - addressable_lambda:
          name: "Volume Display"
          update_interval: 50ms
          lambda: |-
            const int count = it.size();
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                        light_color.get_blue() * 255);
            Color muted(255, 0, 0);
            const float volume_ratio = count * id(external_media_player).volume;
            for (int i = 0; i < count; i++) {
              if (i <= volume_ratio) {
                float level = 255.0f * (volume_ratio - i);
                if (level > 255.0f) {
                  level = 255.0f;
                }
                it[i] = color * (uint8_t) level;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (id(external_media_player).volume == 0.0f) {
              it[0] = muted;
            }
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 50%
