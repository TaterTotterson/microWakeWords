i2s_audio:
  - id: i2s_shared
    i2s_mclk_pin: GPIO12
    i2s_bclk_pin: GPIO13
    i2s_lrclk_pin: GPIO14

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: board_i2c
    sample_rate: 16000
    bits_per_sample: 32bit
    mic_gain: ${mic_gain}

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: board_i2c
    sample_rate: 16000
    bits_per_sample: 32bit
    use_mclk: true

microphone:
  - platform: i2s_audio
    id: board_mics
    i2s_din_pin: GPIO15
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 32bit
    i2s_mode: primary
    i2s_audio_id: i2s_shared
    channel: stereo

speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    sample_rate: 16000
    i2s_mode: primary
    i2s_dout_pin: GPIO16
    bits_per_sample: 32bit
    i2s_audio_id: i2s_shared
    dac_type: external
    channel: stereo
    timeout: never
    buffer_duration: 100ms
    audio_dac: es8311_dac

  - platform: mixer
    id: mixing_speaker
    output_speaker: i2s_audio_speaker
    num_channels: 2
    task_stack_in_psram: true
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
      - id: media_mixing_input
        timeout: never

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 16000
    bits_per_sample: 16
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 16000
    bits_per_sample: 16

http_request:
  buffer_size_rx: 2048

audio_file:
  - id: mute_switch_on_sound
    file: ${mute_switch_on_sound_file}
  - id: mute_switch_off_sound
    file: ${mute_switch_off_sound_file}
  - id: timer_finished_sound
    file: ${timer_finished_sound_file}
  - id: wake_word_triggered_sound
    file: ${wake_word_triggered_sound_file}

media_source:
  - platform: audio_file
    id: audio_file_announcement_source
  - platform: http_request
    id: http_announcement_source
    buffer_size: 250000
  - platform: http_request
    id: http_media_source
    buffer_size: 500000

media_player:
  - platform: speaker
    id: external_media_player
    name: Media Player
    announcement_pipeline:
      format: FLAC
      num_channels: 1
      sample_rate: 48000
      speaker: announcement_resampling_speaker
    media_pipeline:
      format: FLAC
      num_channels: 2
      sample_rate: 48000
      speaker: media_resampling_speaker
    volume_increment: 0.05
    volume_min: 0.20
    volume_max: 1.0
    on_mute:
      - script.execute: control_leds
    on_unmute:
      - script.execute: control_leds
    on_volume:
      - script.execute: control_leds_volume_changed
    on_announcement:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
    on_state:
      if:
        condition:
          and:
            - switch.is_off: timer_ringing
            - not:
                voice_assistant.is_running:
            - not:
                media_player.is_announcing: external_media_player
        then:
          - mixer_speaker.apply_ducking:
              id: media_mixing_input
              decibel_reduction: 0
              duration: 1.0s
