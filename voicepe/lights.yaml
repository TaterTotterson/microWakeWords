light:
  # Hardware LED ring. Not used because remapping needed
  - platform: esp32_rmt_led_strip
    id: leds_internal
    pin: GPIO21
    chipset: WS2812
    max_refresh_rate: 15ms
    num_leds: 12
    rgb_order: GRB
    rmt_symbols: 192
    default_transition_length: 0ms
    power_supply: led_power

  # Voice Assistant LED ring. Remapping of the internal LED.
  # This light is not exposed. The device controls it
  - platform: partition
    id: voice_assistant_leds
    internal: true
    default_transition_length: 0ms
    segments:
      - id: leds_internal
        from: 7
        to: 11
      - id: leds_internal
        from: 0
        to: 6
    effects:
      - addressable_lambda:
          name: "Waiting for Command"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              if (i == id(global_led_animation_index) % 12) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 11) % 12) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 10) % 12) {
                it[i] = color * 128;
              } else if (i == (id(global_led_animation_index) + 6) % 12) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 5) % 12) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 4) % 12) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 12;
      - addressable_lambda:
          name: "Listening For Command"
          update_interval: 50ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              if (i == id(global_led_animation_index) % 12) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 11) % 12) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 10) % 12) {
                it[i] = color * 128;
              } else if (i == (id(global_led_animation_index) + 6) % 12) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 5) % 12) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 4) % 12) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 12;
      - addressable_lambda:
          name: "VoD Listening"
          update_interval: 50ms
          lambda: |-
            static float animated_position = 6.0f;
            static float filtered_delay = 0.0f;
            static uint32_t last_update_ms = 0;
            static uint32_t last_valid_ms = 0;
            constexpr int num_leds = 12;
            constexpr int fade_leds = 3;
            constexpr float center_led = 6.0f;
            constexpr float side_led_span = 3.5f;
            constexpr float max_abs_delay = 1.2f;
            constexpr float delay_deadband = 0.08f;
            constexpr uint8_t min_confidence = 1;
            constexpr float delay_filter_alpha = 0.22f;
            constexpr float transition_duration = 0.25f;
            auto clamp_u8 = [](float value) -> uint8_t {
              if (value <= 0.0f) {
                return 0;
              }
              if (value >= 255.0f) {
                return 255;
              }
              return (uint8_t) value;
            };
            auto wrap_position = [](float position) -> float {
              while (position >= 12.0f) {
                position -= 12.0f;
              }
              while (position < 0.0f) {
                position += 12.0f;
              }
              return position;
            };
            auto delay_to_position = [&](float delay) -> float {
              if (delay > max_abs_delay) {
                delay = max_abs_delay;
              } else if (delay < -max_abs_delay) {
                delay = -max_abs_delay;
              }

              float normalized = delay / max_abs_delay;
              float magnitude = normalized < 0.0f ? -normalized : normalized;
              if (magnitude < delay_deadband) {
                normalized = 0.0f;
              } else {
                magnitude = (magnitude - delay_deadband) / (1.0f - delay_deadband);
                magnitude = 1.0f - ((1.0f - magnitude) * (1.0f - magnitude));
                normalized = normalized < 0.0f ? -magnitude : magnitude;
              }

              float target = center_led - (normalized * side_led_span);
              return wrap_position(target);
            };

            const uint32_t now = millis();
            float dt = 0.05f;
            if (last_update_ms != 0 && now >= last_update_ms) {
              dt = (now - last_update_ms) / 1000.0f;
            }
            last_update_ms = now;
            const bool has_valid_doa = id(xmos_doa).valid() &&
                                       id(xmos_doa).confidence() >= min_confidence;

            if (initial_run) {
              filtered_delay = id(xmos_doa).sample_delay();
              animated_position = has_valid_doa ? delay_to_position(filtered_delay) : center_led;
              last_valid_ms = has_valid_doa ? now : 0;
              dt = 0.0f;
            }

            if (has_valid_doa) {
              filtered_delay += (id(xmos_doa).sample_delay() - filtered_delay) * delay_filter_alpha;
              float target_position = delay_to_position(filtered_delay);
              last_valid_ms = now;

              float diff = target_position - animated_position;
              if (diff > num_leds / 2.0f) {
                diff -= num_leds;
              } else if (diff < -num_leds / 2.0f) {
                diff += num_leds;
              }
              if (diff > 0.01f || diff < -0.01f) {
                animated_position += (diff / transition_duration) * dt;
              } else {
                animated_position = target_position;
              }
            } else if (last_valid_ms == 0 || now - last_valid_ms > 1000) {
              float diff = center_led - animated_position;
              if (diff > num_leds / 2.0f) {
                diff -= num_leds;
              } else if (diff < -num_leds / 2.0f) {
                diff += num_leds;
              }
              animated_position += diff * 0.08f;
            }

            animated_position = wrap_position(animated_position);

            auto light_color = id(led_ring).current_values;
            float selected_r = light_color.get_red() * 255.0f;
            float selected_g = light_color.get_green() * 255.0f;
            float selected_b = light_color.get_blue() * 255.0f;

            for (int i = 0; i < num_leds; i++) {
              float dist = i - animated_position;
              if (dist < 0.0f) {
                dist = -dist;
              }
              if (dist > num_leds / 2.0f) {
                dist = num_leds - dist;
              }

              float base_level = 0.06f;
              float beam_level = 1.0f - (dist / (fade_leds + 1.0f));
              if (beam_level < 0.0f) {
                beam_level = 0.0f;
              }
              beam_level *= 0.65f;

              float center_level = 1.0f - (dist / 1.20f);
              if (center_level < 0.0f) {
                center_level = 0.0f;
              }

              float color_level = base_level + beam_level;
              float r = selected_r * color_level + 255.0f * center_level;
              float g = selected_g * color_level + 240.0f * center_level;
              float b = selected_b * color_level + 170.0f * center_level;
              it[i] = Color(clamp_u8(r), clamp_u8(g), clamp_u8(b));
            }
      - addressable_lambda:
          name: "Thinking"
          update_interval: 80ms
          lambda: |-
            static uint8_t tick = 0;
            static float led_levels[12] = {};
            if (initial_run) {
              tick = 0;
              for (int i = 0; i < 12; i++) {
                led_levels[i] = 0.0f;
              }
            }

            auto clamp_u8 = [](float value) -> uint8_t {
              if (value <= 0.0f) {
                return 0;
              }
              if (value >= 255.0f) {
                return 255;
              }
              return (uint8_t) value;
            };

            auto light_color = id(led_ring).current_values;
            const float selected_r = light_color.get_red() * 255.0f;
            const float selected_g = light_color.get_green() * 255.0f;
            const float selected_b = light_color.get_blue() * 255.0f;

            const uint8_t breath_step = tick % 18;
            const uint8_t breath = breath_step <= 9 ? breath_step : 18 - breath_step;

            for (int i = 0; i < 12; i++) {
              float target_level = 0.025f + ((float) breath * 0.006f);

              const uint8_t bit_phase = (uint8_t) ((i * 7 + tick * 5) % 29);
              if (bit_phase == 0) {
                target_level += 0.86f;
              } else if (bit_phase == 1 || bit_phase == 28) {
                target_level += 0.46f;
              }

              const uint8_t calc_phase = (uint8_t) ((i * 5 + tick * 2) % 17);
              if (calc_phase == 0 || calc_phase == 8) {
                target_level += 0.50f;
              } else if (calc_phase == 1 || calc_phase == 9) {
                target_level += 0.24f;
              }

              if (target_level > 1.0f) {
                target_level = 1.0f;
              }

              const float alpha = target_level > led_levels[i] ? 0.58f : 0.20f;
              led_levels[i] += (target_level - led_levels[i]) * alpha;

              float color_level = led_levels[i];
              if (color_level > 1.0f) {
                color_level = 1.0f;
              }

              float white_level = color_level > 0.55f ? (color_level - 0.55f) * 0.46f : 0.0f;

              float r = selected_r * color_level + 255.0f * white_level;
              float g = selected_g * color_level + 240.0f * white_level;
              float b = selected_b * color_level + 170.0f * white_level;
              it[i] = Color(clamp_u8(r), clamp_u8(g), clamp_u8(b));
            }

            tick++;
      - addressable_lambda:
          name: "Tool Call"
          update_interval: 80ms
          lambda: |-
            static bool moving_forward = true;
            if (initial_run) {
              id(global_led_animation_index) = 0;
              moving_forward = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            uint8_t lead_a = id(global_led_animation_index) % 6;
            uint8_t lead_b = (11 - lead_a) % 12;
            uint8_t trail_a = moving_forward ? (12 + lead_a - 1) % 12 : (lead_a + 1) % 12;
            uint8_t trail_b = moving_forward ? (lead_b + 1) % 12 : (12 + lead_b - 1) % 12;
            uint8_t tail_a = moving_forward ? (12 + lead_a - 2) % 12 : (lead_a + 2) % 12;
            uint8_t tail_b = moving_forward ? (lead_b + 2) % 12 : (12 + lead_b - 2) % 12;
            for (uint8_t i = 0; i < 12; i++) {
              if (i == lead_a || i == lead_b) {
                it[i] = color;
              } else if (i == trail_a || i == trail_b) {
                it[i] = color * 192;
              } else if (i == tail_a || i == tail_b) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (moving_forward) {
              if (id(global_led_animation_index) >= 5) {
                id(global_led_animation_index) = 4;
                moving_forward = false;
              } else {
                id(global_led_animation_index) += 1;
              }
            } else {
              if (id(global_led_animation_index) <= 0) {
                id(global_led_animation_index) = 1;
                moving_forward = true;
              } else {
                id(global_led_animation_index) -= 1;
              }
            }
      - addressable_lambda:
          name: "Replying"
          update_interval: 40ms
          lambda: |-
            static float smoothed_radius = 1.25f;
            if (initial_run) {
              smoothed_radius = 1.25f;
            }

            auto clamp_u8 = [](float value) -> uint8_t {
              if (value <= 0.0f) {
                return 0;
              }
              if (value >= 255.0f) {
                return 255;
              }
              return (uint8_t) value;
            };
            auto ring_distance = [](int a, int b) -> int {
              int dist = a - b;
              if (dist < 0) {
                dist = -dist;
              }
              return dist > 6 ? 12 - dist : dist;
            };

            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 12;
            constexpr int center = 6;
            float audio_level = id(i2s_audio_speaker).audio_level() * 5.5f;
            if (audio_level > 1.0f) {
              audio_level = 1.0f;
            }
            float volume_level = id(external_media_player).volume;
            if (id(external_media_player).is_muted()) {
              audio_level = 0.0f;
              volume_level = 0.0f;
            }
            float target_radius = 0.85f + (audio_level * 3.65f) + (volume_level * 0.85f);
            if (target_radius > 5.5f) {
              target_radius = 5.5f;
            }
            float alpha = target_radius > smoothed_radius ? 0.45f : 0.20f;
            smoothed_radius += (target_radius - smoothed_radius) * alpha;

            auto light_color = id(led_ring).current_values;
            const float selected_r = light_color.get_red() * 255.0f;
            const float selected_g = light_color.get_green() * 255.0f;
            const float selected_b = light_color.get_blue() * 255.0f;

            for (int i = 0; i < 12; i++) {
              int dist = ring_distance(i, center);
              float level = smoothed_radius - (float) dist;
              if (level <= 0.0f) {
                it[i] = Color::BLACK;
                continue;
              }

              if (level > 1.0f) {
                level = 1.0f;
              }
              float ripple = 0.86f + (0.14f * ((id(global_led_animation_index) + dist * 5) % 4) / 3.0f);
              float color_level = (0.12f + (level * 0.76f)) * ripple;
              float center_level = 1.0f - ((float) dist / 1.6f);
              if (center_level < 0.0f) {
                center_level = 0.0f;
              }
              center_level *= 0.52f;

              float r = selected_r * color_level + 255.0f * center_level;
              float g = selected_g * color_level + 240.0f * center_level;
              float b = selected_b * color_level + 170.0f * center_level;
              it[i] = Color(clamp_u8(r), clamp_u8(g), clamp_u8(b));
            }
      - addressable_lambda:
          name: "Muted or Silent"
          update_interval: 16ms
          lambda: |-
            static int8_t index = 0;
            Color muted_color(255, 0, 0);
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              if ( light_color.get_state() ) {
                it[i] = color;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if ( id(master_mute_switch).state ) {
              it[2] = Color::BLACK;
              it[3] = muted_color;
              it[4] = Color::BLACK;
              it[8] = Color::BLACK;
              it[9] = muted_color;
              it[10] = Color::BLACK;
            }
            if ( id(external_media_player).volume == 0.0f || id(external_media_player).is_muted() ) {
              it[5] = Color::BLACK;
              it[6] = muted_color;
              it[7] = Color::BLACK;
            }
      - addressable_lambda:
          name: "Voice kit startup failed"
          # update_interval: 16ms
          lambda: |-
            static int8_t index = 0;
            Color fail_color(255, 0, 0);
            for (uint8_t i = 0; i < 12; i++) {
              if (i % 3) {
                it[i] = Color::BLACK;
              } else {
                it[i] = fail_color;
              }
            }
      - addressable_lambda:
          name: "Volume Display"
          update_interval: 50ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color silenced_color(255, 0, 0);
            auto volume_ratio = 12.0f * id(external_media_player).volume;
            for (uint8_t i = 0; i < 12; i++) {
              if (i <= volume_ratio) {
                it[(6+i)%12] = color * min( 255.0f * (volume_ratio - i) , 255.0f ) ;
              } else {
                it[(6+i)%12] = Color::BLACK;
              }
            }
            if (id(external_media_player).volume == 0.0f) {
              it[6] = silenced_color;
            }
      - addressable_lambda:
          name: "Center Button Touched"
          update_interval: 16ms
          lambda: |-
            if (initial_run) {
              // set voice_assistant_leds light to colors based on led_ring
              auto led_ring_cv = id(led_ring).current_values;
              auto va_leds_call = id(voice_assistant_leds).make_call();
              va_leds_call.from_light_color_values(led_ring_cv);
              va_leds_call.set_brightness( min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f ) );
              va_leds_call.set_state(true);
              va_leds_call.perform();
            }
            auto light_color = id(voice_assistant_leds).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              it[i] = color;
            }
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 50%
      - addressable_lambda:
          name: "Error"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            Color error_color(255, 0, 0);
            for (uint8_t i = 0; i < 12; i++) {
              it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Success"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            Color success_color(0, 255, 0);
            for (uint8_t i = 0; i < 12; i++) {
              it[i] = success_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Timer Ring"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color muted_color(255, 0, 0);
            for (uint8_t i = 0; i < 12; i++) {
              it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if ( id(master_mute_switch).state ) {
              it[3] = muted_color;
              it[9] = muted_color;
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Timer Tick"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color muted_color(255, 0, 0);
            auto timer_ratio = 12.0f * id(first_active_timer).seconds_left / max(id(first_active_timer).total_seconds , static_cast<uint32_t>(1));
            uint8_t last_led_on = static_cast<uint8_t>(ceil(timer_ratio)) - 1;
            for (uint8_t i = 0; i < 12; i++) {
              float brightness_dip = ( i == id(global_led_animation_index) % 12 && i != last_led_on ) ? 0.9f : 1.0f ;
              if (i <= timer_ratio) {
                it[i] = color * min(255.0f * brightness_dip * (timer_ratio - i) , 255.0f * brightness_dip) ;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (id(master_mute_switch).state) {
              it[2] = Color::BLACK;
              it[3] = muted_color;
              it[4] = Color::BLACK;
              it[8] = Color::BLACK;
              it[9] = muted_color;
              it[10] = Color::BLACK;
            }
            id(global_led_animation_index) = (12 + id(global_led_animation_index) - 1) % 12;
      - addressable_lambda:
          name: "Remote Timer tick"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color muted_color(255, 0, 0);

            float total = max((float) id(remote_timer_total_seconds), 1.0f);
            float left = max((float) id(remote_timer_remaining_seconds), 0.0f);
            float timer_ratio = 12.0f * left / total;

            uint8_t last_led_on = static_cast<uint8_t>(ceil(timer_ratio)) - 1;
            for (uint8_t i = 0; i < 12; i++) {
              float brightness_dip = ( i == id(global_led_animation_index) % 12 && i != last_led_on ) ? 0.9f : 1.0f ;
              if (i <= timer_ratio) {
                it[i] = color * min(255.0f * brightness_dip * (timer_ratio - i) , 255.0f * brightness_dip) ;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (id(master_mute_switch).state) {
              it[2] = Color::BLACK;
              it[3] = muted_color;
              it[4] = Color::BLACK;
              it[8] = Color::BLACK;
              it[9] = muted_color;
              it[10] = Color::BLACK;
            }
            id(global_led_animation_index) = (12 + id(global_led_animation_index) - 1) % 12;
      - addressable_rainbow:
          name: "Rainbow"
          width: 12
      - addressable_lambda:
          name: "Tick"
          update_interval: 333ms
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 0, 0);
            if (initial_run) {
              index = 0;
            }
            for (uint8_t i = 0; i < 12; i++) {
              if (i <= index ) {
                it[i] = Color::BLACK;
              } else {
                it[i] = color;
              }
            }
            index = (index + 1) % 12;
      - addressable_lambda:
          name: "Flashing XMOS"
          update_interval: 333ms
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 138, 0);
            if (initial_run) {
              index = 0;
            }
            for (uint8_t i = 0; i < 12; i++) {
              if (i <= index ) {
                it[i] = Color::BLACK;
              } else {
                it[i] = color;
              }
            }
            index = id(global_led_animation_index) % 12;
      - addressable_lambda:
          name: "Factory Reset Coming Up"
          update_interval: 1s
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 0, 0);
            if (initial_run) {
              index = 0;
            }
            for (uint8_t i = 0; i < 12; i++) {
              if (i <= index ) {
                it[i] = color;
              } else {
                it[i] = Color::BLACK;
              }
            }
            index = (index + 1) % 12;
      - addressable_lambda:
          name: "Jack Plugged"
          update_interval: 40ms
          lambda: |-
              static uint8_t index = 0;
              if (initial_run) {
                index = 0;
              }
              auto light_color = id(led_ring).current_values;
              Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                    light_color.get_blue() * 255);
              if (index <= 6) {
                for (uint8_t i = 0; i < 12; i++) {
                  if (i == index) {
                    it[i] = color;
                  } else if (i == (12 - index) % 12) {
                    it[i] = color;
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
              }
              index = (index + 1);
      - addressable_lambda:
          name: "Jack Unplugged"
          update_interval: 40ms
          lambda: |-
              static uint8_t index = 0;
              if (initial_run) {
                index = 0;
              }
              auto light_color = id(led_ring).current_values;
              Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                    light_color.get_blue() * 255);
              if (index <= 6) {
                for (uint8_t i = 0; i < 12; i++) {
                  if (i == 6 - index) {
                    it[i] = color;
                  } else if (i == (6 + index) % 12) {
                    it[i] = color;
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
              }
              index = (index + 1);

  # User facing LED ring. Remapping of the internal LEDs.
  # Exposed to be used by the user.
  - platform: partition
    id: led_ring
    name: LED Ring
    entity_category: config
    icon: "mdi:circle-outline"
    default_transition_length: 0ms
    restore_mode: RESTORE_DEFAULT_OFF
    initial_state:
      color_mode: rgb
      brightness: 66%
      red: 9.4%
      green: 73.3%
      blue: 94.9%
    segments:
      - id: leds_internal
        from: 7
        to: 11
      - id: leds_internal
        from: 0
        to: 6

power_supply:
  - id: led_power
    pin:
      number: GPIO45
      ignore_strapping_warning: true
