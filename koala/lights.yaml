light:
  # Hardware LED ring. Not used because remapping needed
  - platform: esp32_rmt_led_strip
    id: leds_internal
    pin: GPIO13
    chipset: WS2812
    max_refresh_rate: 15ms
    num_leds: 43
    rgb_order: GRB
    rmt_symbols: 96
    default_transition_length: 0ms
    color_correct: [70%, 70%, 70%]

  # Voice Assistant LED ring. Remapping of the internal LED.
  # This light is not exposed. The device controls it
  - platform: partition
    id: voice_assistant_leds
    internal: true
    default_transition_length: 0ms
    segments:
      - id: leds_internal
        from: 0
        to: 31
        reversed: True
      - id: leds_internal
        from: 32
        to: 42
        reversed: True
    effects:
      - addressable_lambda:
          name: "Waiting for Command"
          update_interval: 60ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255, light_color.get_blue() * 255);
            int step = 255/43;
            for (uint8_t i = 0; i < 43; i++) {
              it[i] = color * (((43 - id(global_led_animation_index) + i) % 43) * step);
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 43;
      - addressable_lambda:
          name: "Listening For Command"
          update_interval: 30ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255, light_color.get_blue() * 255);
            int step = 255/43;
            for (uint8_t i = 0; i < 43; i++) {
              it[i] = color * (((43 - id(global_led_animation_index) + i) % 43) * step);
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 43;
      - addressable_lambda:
          name: "Thinking"
          update_interval: 30ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255, light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 43; i++) {
                it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Tool Call"
          update_interval: 80ms
          lambda: |-
            static bool moving_forward = true;
            constexpr int NUM_LEDS = 43;
            constexpr int MAX_INDEX = NUM_LEDS / 2;
            if (initial_run) {
              id(global_led_animation_index) = 0;
              moving_forward = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255, light_color.get_blue() * 255);

            int lead_a = id(global_led_animation_index);
            int lead_b = NUM_LEDS - 1 - lead_a;
            int trail_a = moving_forward ? lead_a - 1 : lead_a + 1;
            int trail_b = moving_forward ? lead_b + 1 : lead_b - 1;
            int tail_a = moving_forward ? lead_a - 2 : lead_a + 2;
            int tail_b = moving_forward ? lead_b + 2 : lead_b - 2;

            for (int i = 0; i < NUM_LEDS; i++) {
              if (i == lead_a || i == lead_b) {
                it[i] = color;
              } else if (i == trail_a || i == trail_b) {
                it[i] = color * 192;
              } else if (i == tail_a || i == tail_b) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }

            if (moving_forward) {
              if (id(global_led_animation_index) >= MAX_INDEX) {
                id(global_led_animation_index) = MAX_INDEX - 1;
                moving_forward = false;
              } else {
                id(global_led_animation_index) += 1;
              }
            } else {
              if (id(global_led_animation_index) <= 0) {
                id(global_led_animation_index) = 1;
                moving_forward = true;
              } else {
                id(global_led_animation_index) -= 1;
              }
            }
      - addressable_lambda:
          name: "Replying"
          update_interval: 30ms
          lambda: |-
            id(global_led_animation_index) = (43 + id(global_led_animation_index) - 1) % 43;
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255, light_color.get_blue() * 255);
            int step = 255/43;
            for (uint8_t i = 0; i < 43; i++) {
              it[i] = color * (255 - (((43 - id(global_led_animation_index) + i) % 43) * step));
            }
      - addressable_lambda:
          name: "Respeaker startup failed"
          lambda: |-
            Color fail_color(255, 0, 0);
            for (uint8_t i = 0; i < 43; i++) {
              if (i % 3) {
                it[i] = Color::BLACK;
              } else {
                it[i] = fail_color;
              }
            }
      - addressable_lambda:
          name: "Volume Display"
          update_interval: 50ms
          lambda: |-
            Color color(255, 0, 255);
            Color silenced_color(255, 0, 0);
            auto volume_ratio = id(external_media_player).volume * 10.0f;
            auto is_muted = id(external_media_player).is_muted() || id(external_media_player).volume == 0.0f;
            for (uint8_t i = 0; i < 43; i++) {
              if (i <= volume_ratio && !is_muted) {
                it[i] = color * min( 255.0f * (volume_ratio - i) , 255.0f ) ;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (is_muted) {
              it[5] = silenced_color;
            }
      - addressable_lambda:
          name: "Center Button Touched"
          update_interval: 16ms
          lambda: |-
            if (initial_run) {
              // set voice_assistant_leds light to colors based on led_ring
              auto led_ring_cv = id(led_ring).current_values;
              auto va_leds_call = id(voice_assistant_leds).make_call();
              va_leds_call.from_light_color_values(led_ring_cv);
              va_leds_call.set_brightness( min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f ) );
              va_leds_call.set_state(true);
              va_leds_call.perform();
            }
            auto light_color = id(voice_assistant_leds).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 43; i++) {
              it[i] = color;
            }
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 50%
      - addressable_rainbow:
          name: "Rainbow"
          width: 43
      - addressable_lambda:
          name: "Error"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            Color error_color(255, 0, 0);
            for (uint8_t i = 0; i < 43; i++) {
              it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Timer Ring"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 43; i++) {
              it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Timer Tick"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            auto timer_ratio = 43.0f * id(first_active_timer).seconds_left / max(id(first_active_timer).total_seconds , static_cast<uint32_t>(1));
            uint8_t last_led_on = static_cast<uint8_t>(ceil(timer_ratio)) - 1;
            for (uint8_t i = 0; i < 43; i++) {
              float brightness_dip = ( i == id(global_led_animation_index) % 43 && i != last_led_on ) ? 0.96f : 1.0f ;
              if (i <= timer_ratio) {
                it[i] = color * min(255.0f * brightness_dip * (timer_ratio - i) , 255.0f * brightness_dip) ;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (43 + id(global_led_animation_index) - 1) % 43;
      - addressable_lambda:
          name: "Factory Reset Coming Up"
          update_interval: 1s
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 0, 0);
            if (initial_run) {
              index = 0;
            }
            for (uint8_t i = 0; i < 43; i++) {
              if (i <= index ) {
                it[i] = color;
              } else {
                it[i] = Color::BLACK;
              }
            }
            index = (index + 1) % 43;
  # User facing LED ring. Remapping of the internal LEDs.
  # Exposed to be used by the user.
  - platform: partition
    id: led_ring
    name: LED Ring
    entity_category: config
    icon: "mdi:circle-outline"
    default_transition_length: 0ms
    restore_mode: RESTORE_DEFAULT_OFF
    initial_state:
      color_mode: rgb
      brightness: 66%
      red: 9.4%
      green: 73.3%
      blue: 94.9%
    segments:
      - id: leds_internal
        from: 0
        to: 31
        reversed: True
      - id: leds_internal
        from: 32
        to: 42
        reversed: True
    effects:
      - addressable_rainbow:
          name: "Rainbow"
          width: 43

  - platform: esp32_rmt_led_strip
    id: led_respeaker_onboard
    name: LED Respeaker onboard
    disabled_by_default: true
    internal: false
    rgb_order: GRB
    pin: GPIO1
    num_leds: 1
    rmt_symbols: 48
    chipset: ws2812
    entity_category: config
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Slow Pulse"
          transition_length: 500ms
          update_interval: 500ms
          min_brightness: 50%
          max_brightness: 100%
  - platform: esp32_rmt_led_strip
    id: led_esp_onboard
    name: LED ESP onboard
    disabled_by_default: true
    internal: false
    rgb_order: GRB
    pin: GPIO48
    num_leds: 1
    rmt_symbols: 48
    chipset: ws2812
    entity_category: config
    default_transition_length: 0s
sensor:
  # The dial. Used to control volume and Hue of the LED ring.
  - platform: rotary_encoder
    id: dial
    pin_a: GPIO47
    pin_b: GPIO21
    resolution: 1
    on_clockwise:
      - lambda: id(dial_touched) = true;
      - if:
          condition:
            binary_sensor.is_off: user_button
          then:
            - script.execute:
                id: control_volume
                increase_volume: true
          else:
            - if:
                condition:
                  media_player.is_playing:
                    id: sendspin_group_media_player
                then:
                  - script.execute:
                      id: control_group_volume
                      increase_volume: true
                else:
                  - script.execute:
                      id: control_hue
                      increase_hue: true
    on_anticlockwise:
      - lambda: id(dial_touched) = true;
      - if:
          condition:
            binary_sensor.is_off: user_button
          then:
            - script.execute:
                id: control_volume
                increase_volume: false
          else:
            - if:
                condition:
                  media_player.is_playing:
                    id: sendspin_group_media_player
                then:
                  - script.execute:
                      id: control_group_volume
                      increase_volume: false
                else:
                  - script.execute:
                      id: control_hue
                      increase_hue: false
  - platform: template
    id: next_timer
    name: "Next timer"
    update_interval: never
    disabled_by_default: true
    device_class: duration
    unit_of_measurement: s
    icon: "mdi:timer"
text_sensor:
  - platform: template
    id: next_timer_name
    name: "Next timer name"
    icon: "mdi:timer"
    disabled_by_default: true
  - platform: template
    name: "Current device time"
    id: current_time
    icon: mdi:clock
