switch:
  # Mute Sound Switch.
  - platform: template
    id: mute_sound
    name: Mute-unmute sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  # Wake Word Sound Switch.
  - platform: template
    id: wake_sound
    name: Wake sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  # Beam Lock. When on, the XVF3800 beam is pinned to the wake-word direction
  # for the duration of command capture (released on STT VAD end). Off by default
  # because fixed-beam mode is a behavioural change worth opting into deliberately.
  - platform: template
    id: beam_lock_enabled
    name: Beam lock
    icon: "mdi:target-account"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  # Internal switch to track when a timer is ringing on the device.
  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      # Disable stop wake word
      - micro_wake_word.disable_model: stop
      - script.execute: disable_repeat
      # Stop any current announcement (ie: stop the timer ring mid playback)
      - if:
          condition:
            media_player.is_announcing:
              id: external_media_player
          then:
            media_player.stop:
              announcement: true
              id: external_media_player
      # Set back ducking ratio to zero
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 0
          duration: 1.0s
      # Refresh the LED ring
      - script.execute: control_leds
    on_turn_on:
      # Duck audio
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
      # Enable stop wake word
      - micro_wake_word.enable_model: stop
      # Ring timer
      - script.execute: ring_timer
      # Refresh LED
      - script.execute: control_leds
      # If 15 minutes have passed and the timer is still ringing, stop it.
      - delay: 15min
      - switch.turn_off: timer_ringing
  # Defines if alarm is active
  - platform: template
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    id: alarm_on
    icon: mdi:bell-badge
    name: "Alarm on"

event:
  - platform: template
    id: button_press_event
    name: "Button press"
    icon: mdi:button-pointer
    device_class: button
    event_types:
      - push_to_intercom

button:
  - platform: template
    id: push_to_intercom_start
    name: "Push To Intercom Start"
    icon: mdi:bullhorn
    entity_category: config
    on_press:
      - script.execute: start_push_to_intercom
  - platform: template
    id: push_to_intercom_stop
    name: "Push To Intercom Stop"
    icon: mdi:bullhorn-off
    entity_category: config
    on_press:
      - script.execute: stop_push_to_intercom
