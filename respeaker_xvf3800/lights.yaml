number:
  - platform: template
    id: user_led_ring_brightness
    name: "LED ring brightness"
    icon: "mdi:brightness-6"
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 1
    step: 0.05
    initial_value: 0.8

select:
  - platform: template
    id: user_led_color_preset
    name: "LED color preset"
    icon: "mdi:palette"
    entity_category: config
    optimistic: true
    options:
      - "Custom"
      - "Tater"
      - "Blue"
      - "Green"
      - "Red"
      - "White"
    initial_option: "Tater"
    set_action:
      - lambda: |-
          if (x == "Tater") {
            id(user_led_ring_color_r) = 255.0f;
            id(user_led_ring_color_g) = 120.0f;
            id(user_led_ring_color_b) = 0.0f;
          } else if (x == "Blue") {
            id(user_led_ring_color_r) = 0.0f;
            id(user_led_ring_color_g) = 120.0f;
            id(user_led_ring_color_b) = 255.0f;
          } else if (x == "Green") {
            id(user_led_ring_color_r) = 0.0f;
            id(user_led_ring_color_g) = 220.0f;
            id(user_led_ring_color_b) = 80.0f;
          } else if (x == "Red") {
            id(user_led_ring_color_r) = 255.0f;
            id(user_led_ring_color_g) = 0.0f;
            id(user_led_ring_color_b) = 0.0f;
          } else if (x == "White") {
            id(user_led_ring_color_r) = 255.0f;
            id(user_led_ring_color_g) = 255.0f;
            id(user_led_ring_color_b) = 255.0f;
          }

sensor:
  - platform: template
    id: next_timer
    name: "Next timer"
    update_interval: never
    disabled_by_default: true
    device_class: duration
    unit_of_measurement: s
    icon: "mdi:timer"

text_sensor:
  - platform: template
    id: next_timer_name
    name: "Next timer name"
    icon: "mdi:timer"
    disabled_by_default: true
  - platform: template
    id: current_time
    name: "Current device time"
    icon: mdi:clock
