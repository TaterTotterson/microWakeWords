<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">Tater ESP32-S3-BOX-3 display mockup</title>
  <desc id="desc">ESP32-S3-BOX-3 device image with the Tater LVGL home dashboard mocked onto the screen.</desc>
  <defs>
    <clipPath id="screen-clip" clipPathUnits="userSpaceOnUse">
      <polygon points="425,265 820,192 960,674 550,710" />
    </clipPath>
    <linearGradient id="screen-gloss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="0.46" stop-color="#ffffff" stop-opacity="0.02" />
      <stop offset="1" stop-color="#000000" stop-opacity="0.20" />
    </linearGradient>
    <filter id="orange-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .ui { font-family: Inter, Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .muted { fill: #c8c8c8; }
      .white { fill: #ffffff; }
      .orange { fill: #ff8a00; }
      .panel { fill: #0b0b0b; stroke: #303030; stroke-width: 1; }
      .tiny { font-size: 14px; }
      .body { font-size: 18px; }
      .value { font-size: 24px; font-weight: 700; }
    </style>
  </defs>

  <image href="taterD.png" x="0" y="0" width="1254" height="1254" preserveAspectRatio="xMidYMid meet" />

  <polygon points="425,265 820,192 960,674 550,710" fill="#000000" stroke="#111111" stroke-width="2" />

  <g clip-path="url(#screen-clip)">
    <g class="ui" transform="matrix(1.196875 -0.21875 0.5125 1.8125 432 270)">
      <rect x="0" y="0" width="320" height="240" fill="#000000" />
      <rect x="0" y="0" width="320" height="34" fill="#050505" />
      <text x="10" y="22" class="orange body" font-weight="700">Tater</text>
      <text x="310" y="23" text-anchor="end" class="muted tiny">Tater online</text>

      <text x="160" y="58" text-anchor="middle" class="muted body">Tue May 12</text>
      <text x="160" y="110" text-anchor="middle" class="white" font-size="56" font-weight="800">06:56</text>

      <rect x="12" y="128" width="142" height="62" rx="8" class="panel" />
      <text x="22" y="149" class="muted tiny">Inside</text>
      <text x="22" y="176" class="orange value" filter="url(#orange-glow)">72.4 F</text>
      <text x="144" y="178" text-anchor="end" class="white body">45%</text>

      <rect x="166" y="128" width="142" height="62" rx="8" class="panel" />
      <text x="176" y="149" class="muted tiny">Outside</text>
      <text x="176" y="176" class="orange value" filter="url(#orange-glow)">75.1 F</text>
      <text x="298" y="178" text-anchor="end" class="white body">66%</text>

      <rect x="12" y="202" width="90" height="28" rx="8" class="panel" />
      <text x="22" y="221" class="muted tiny">Wind</text>
      <text x="92" y="221" text-anchor="end" class="white tiny">1.3</text>

      <rect x="114" y="202" width="90" height="28" rx="8" class="panel" />
      <text x="124" y="221" class="muted tiny">Rain</text>
      <text x="194" y="221" text-anchor="end" class="white tiny">0</text>

      <rect x="216" y="202" width="92" height="28" rx="8" class="panel" />
      <text x="226" y="221" class="muted tiny">Storm</text>
      <text x="298" y="221" text-anchor="end" class="white tiny">0</text>
    </g>
    <polygon points="425,265 820,192 960,674 550,710" fill="url(#screen-gloss)" />
  </g>
</svg>
