# Tater display firmware for the ESP32-S3-BOX-3.
substitutions:
  firmware_version: "3.0.5"
  device_name: taters3box
  friendly_name: taterS3Box
  tater_first_name: Tater
  display_target: livingroom

  # Point this at the Tater host running the voice/display API.
  tater_base_url: http://tater.local:8501
  tater_token: ""
  timezone: America/Chicago

  # Wi-Fi / OTA target
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  device_ip: 10.4.20.237

  # Tater display feed slots. These are Home Assistant entity ids already known to Tater.
  sensor_temp_out: sensor.weather_outdoor_temperature
  sensor_temp_in: sensor.living_room_temperature
  sensor_humidity_out: sensor.humidity
  sensor_humidity_in: sensor.up_sense_humidity_level
  sensor_wind_speed: sensor.wind_speed
  sensor_rain_rate: sensor.rain_rate
  sensor_lightning_strikes: sensor.weather_lightning_strikes

  # Tater voice / wake word
  wake_engine: microwakeword
  openwakeword_server_url: ws://tater.local:8501
  nanowakeword_server_url: ws://tater.local:8501
  openwakeword_http_timeout_ms: "3000"
  openwakeword_max_failures: "3"
  wake_word_name: hey_tater
  wake_word_model_url: https://raw.githubusercontent.com/TaterTotterson/microWakeWords/refs/heads/main/microWakeWordsV3/hey_tater.json
  wake_cutoff_slight: "250"
  wake_cutoff_moderate: "245"
  wake_cutoff_very: "222"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  min_version: 2026.4.0
  project:
    name: tater.s3box_display
    version: ${firmware_version}
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: lcd_backlight
          brightness: !lambda |-
            float brightness = id(display_brightness).state;
            if (brightness != brightness) {
              brightness = 100.0f;
            }
            if (brightness < 10.0f) {
              brightness = 10.0f;
            }
            if (brightness > 100.0f) {
              brightness = 100.0f;
            }
            return brightness / 100.0f;
      - script.execute: refresh_clock

dashboard_import:
  package_import_url: github://TaterTotterson/microWakeWords/esp32-s3-box-3.yaml@main
  import_full_config: true

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  partitions:
    - name: mww_model_a
      type: data
      subtype: 0x40
      size: 0x80000
    - name: mww_model_b
      type: data
      subtype: 0x41
      size: 0x80000
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  use_address: ${device_ip}
  reboot_timeout: 0s
  ap:
  on_connect:
    then:
      - text_sensor.template.publish:
          id: connection_status_text
          state: "Wi-Fi online"
      - script.execute: fetch_tater_feed
      - script.wait: fetch_tater_feed
      - delay: 1s
      - script.execute: fetch_tater_events
  on_disconnect:
    then:
      - text_sensor.template.publish:
          id: connection_status_text
          state: "Wi-Fi offline"

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG
  logs:
    lvgl: WARN

api:
  reboot_timeout: 0s

button:
  - platform: template
    id: refresh_display_events_button
    name: Refresh Display Events
    entity_category: diagnostic
    on_press:
      then:
        - script.execute: fetch_tater_feed
        - script.wait: fetch_tater_feed
        - script.execute: fetch_tater_events

ota:
  - platform: esphome

captive_portal:

external_components:
  - source:
      type: git
      url: https://github.com/TaterTotterson/microWakeWords
      ref: main
      path: shared/components
    components:
      - voice_assistant
      - micro_wake_word
      - remote_wake_word
    refresh: 1h

time:
  - platform: sntp
    id: local_time
    timezone: ${timezone}
    on_time_sync:
      then:
        - script.execute: refresh_clock
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - script.execute: refresh_clock

json:

http_request:
  timeout: 3s
  verify_ssl: false
  buffer_size_rx: 1024
  buffer_size_tx: 1024

online_image:
  - url: "http://127.0.0.1/"
    id: event_snapshot_image
    format: JPEG
    type: RGB565
    resize: 296x122
    update_interval: never
    request_headers:
      X-Tater-Token: "${tater_token}"
    on_download_finished:
      then:
        - logger.log:
            level: INFO
            tag: tater.display
            format: "Snapshot download finished; showing image."
        - lvgl.image.update:
            id: event_image_widget
            src: event_snapshot_image
        - lvgl.widget.show: event_image_widget
        - lvgl.widget.hide: event_image_status_label
        - if:
            condition:
              lambda: return id(event_visible) && id(event_kind_text).state != "tool_call";
            then:
              - lvgl.page.show: event_image_page
        - lvgl.widget.redraw:
            id: event_image_widget
    on_error:
      then:
        - logger.log:
            level: WARN
            tag: tater.display
            format: "Snapshot download failed or could not be decoded."
        - lvgl.widget.hide: event_image_widget
        - lvgl.label.update:
            id: event_image_status_label
            text: "Snapshot unavailable"
        - lvgl.widget.show: event_image_status_label
        - if:
            condition:
              lambda: return id(event_visible) && id(event_kind_text).state != "tool_call";
            then:
              - lvgl.page.show: event_image_page

i2c:
  - id: i2c_adc_dac
    scl: GPIO18
    sda: GPIO8

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: GPIO45
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2

audio_adc:
  - platform: es7210
    i2c_id: i2c_adc_dac
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

audio_dac:
  - platform: es8311
    i2c_id: i2c_adc_dac
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 48000

microphone:
  - platform: i2s_audio
    id: box_mic
    sample_rate: 16000
    i2s_din_pin: GPIO16
    bits_per_sample: 16bit
    adc_type: external

speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_dout_pin: GPIO15
    dac_type: external
    sample_rate: 48000
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_dac
    buffer_duration: 100ms

media_player:
  - platform: speaker
    id: speaker_media_player
    name: None
    volume_min: 0.5
    volume_max: 0.8
    announcement_pipeline:
      speaker: box_speaker
    on_announcement:
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - micro_wake_word.stop:
    on_idle:
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - switch.is_off: master_mute_switch
              - lambda: return id(wake_engine_select).state == "microwakeword";
          then:
            - micro_wake_word.start:
            - script.execute: show_home_if_no_event

spi:
  - id: spi_bus
    clk_pin: GPIO7
    mosi_pin: GPIO6

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: lcd_backlight
    name: LCD Backlight
    entity_category: config
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 120ms

globals:
  - id: last_event_seq
    type: int
    restore_value: no
    initial_value: "0"
  - id: tater_http_failures
    type: int
    restore_value: no
    initial_value: "0"
  - id: display_poll_tick
    type: int
    restore_value: no
    initial_value: "0"
  - id: event_visible
    type: bool
    restore_value: no
    initial_value: "false"
  - id: event_until_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: tool_animation_frame
    type: int
    restore_value: no
    initial_value: "0"
  - id: voice_animation_frame
    type: int
    restore_value: no
    initial_value: "0"
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: "10"
  - id: openwakeword_wake_detected
    type: bool
    restore_value: no
    initial_value: "false"
  - id: voice_api_connected
    type: bool
    restore_value: no
    initial_value: "false"

micro_wake_word:
  id: mww
  models:
    - model: ${wake_word_model_url}
      id: ${wake_word_name}
  vad:
  microphone:
    microphone: box_mic
    channels: 0
    gain_factor: 4
  on_wake_word_detected:
    - logger.log:
        level: INFO
        tag: tater.voice
        format: "Wake word detected: %s"
        args: ["wake_word.c_str()"]
    - if:
        condition:
          switch.is_off: master_mute_switch
        then:
          - if:
              condition:
                voice_assistant.is_running:
              then:
                - voice_assistant.stop:
              else:
                - lambda: |-
                    id(openwakeword_wake_detected) = false;
                    id(voice_assistant_phase) = 2;
                - text_sensor.template.publish:
                    id: connection_status_text
                    state: "Listening"
                - script.execute: show_voice_page
                - voice_assistant.start:
                    wake_word: !lambda return wake_word;

remote_wake_word:
  id: oww
  microphone:
    microphone: box_mic
    channels: 0
    gain_factor: 4
  url: ${openwakeword_server_url}
  stream_path: /api/openwakeword/stream
  source_device: ${device_name}
  wake_word: ${wake_word_name}
  chunk_duration_ms: 500
  max_failures: ${openwakeword_max_failures}
  http_timeout_ms: ${openwakeword_http_timeout_ms}
  on_wake_word_detected:
    - logger.log:
        level: INFO
        tag: tater.voice
        format: "Remote wake word detected: %s"
        args: ["wake_word.c_str()"]
    - if:
        condition:
          switch.is_off: master_mute_switch
        then:
          - if:
              condition:
                voice_assistant.is_running:
              then:
                - voice_assistant.stop:
              else:
                - lambda: |-
                    id(openwakeword_wake_detected) = true;
                    id(voice_assistant_phase) = 2;
                - text_sensor.template.publish:
                    id: connection_status_text
                    state: "Listening"
                - script.execute: show_voice_page
                - voice_assistant.start:
                    wake_word: !lambda return wake_word;
  on_error:
    - logger.log:
        level: WARN
        tag: tater.voice
        format: "Remote wake word unavailable, temporarily using microWakeWord: %s"
        args: ["message.c_str()"]
    - script.execute: recover_openwakeword_after_fallback
    - text_sensor.template.publish:
        id: connection_status_text
        state: "Using local wake"

voice_assistant:
  id: va
  microphone: box_mic
  media_player: speaker_media_player
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_client_connected:
    - logger.log:
        level: INFO
        tag: tater.voice
        format: "Voice assistant client connected; starting wake word detection."
    - lambda: |-
        id(voice_api_connected) = true;
        id(openwakeword_wake_detected) = false;
    - lambda: |-
        id(mww).set_capture_upload_enabled(id(capture_wake_audio).state);
        id(mww).set_capture_close_misses_enabled(id(capture_close_misses).state);
        id(mww).set_capture_close_miss_probability_cutoff(id(close_miss_threshold).state);
        id(mww).set_capture_upload_url(id(trainer_app_url).state);
        if (id(wake_engine_select).state == "nanowakeword") {
          id(oww).set_url(id(nanowakeword_server_url).state);
          id(oww).set_stream_path("/api/nanowakeword/stream");
        } else {
          id(oww).set_url(id(openwakeword_server_url).state);
          id(oww).set_stream_path("/api/openwakeword/stream");
        }
    - script.execute: apply_wake_engine
    - lambda: id(voice_assistant_phase) = 1;
    - text_sensor.template.publish:
        id: connection_status_text
        state: "Voice ready"
  on_client_disconnected:
    - logger.log:
        level: WARN
        tag: tater.voice
        format: "Voice assistant client disconnected; stopping wake word detection."
    - lambda: id(voice_api_connected) = false;
    - voice_assistant.stop:
    - micro_wake_word.stop:
    - remote_wake_word.stop:
    - lambda: |-
        id(openwakeword_wake_detected) = false;
        id(voice_assistant_phase) = 10;
    - text_sensor.template.publish:
        id: connection_status_text
        state: "Voice offline"
    - script.execute: show_home_if_no_event
  on_error:
    - lambda: id(openwakeword_wake_detected) = false;
    - if:
        condition:
          or:
            - lambda: return code == "duplicate_wake_up_detected";
            - lambda: return code == "stt-no-text-recognized";
        then:
          - if:
              condition:
                voice_assistant.is_running:
              then:
                - voice_assistant.stop:
          - lambda: id(voice_assistant_phase) = 1;
          - text_sensor.template.publish:
              id: connection_status_text
              state: "Voice ready"
          - script.execute: show_home_if_no_event
    - if:
        condition:
          and:
            - lambda: return code != "duplicate_wake_up_detected";
            - lambda: return code != "stt-no-text-recognized";
        then:
          - lambda: id(voice_assistant_phase) = 11;
          - text_sensor.template.publish:
              id: connection_status_text
              state: "Voice error"
          - script.execute: show_voice_page
  on_wake_word_detected:
    - if:
        condition:
          lambda: return id(wake_engine_select).state != "microwakeword";
        then:
          - lambda: |-
              id(openwakeword_wake_detected) = true;
              id(voice_assistant_phase) = 2;
          - text_sensor.template.publish:
              id: connection_status_text
              state: "Listening"
          - script.execute: show_voice_page
  on_start:
    - remote_wake_word.stop:
    - if:
        condition:
          lambda: return id(wake_engine_select).state == "microwakeword" || id(openwakeword_wake_detected);
        then:
          - lambda: id(voice_assistant_phase) = 2;
          - text_sensor.template.publish:
              id: connection_status_text
              state: "Voice active"
          - script.execute: show_voice_page
        else:
          - lambda: id(voice_assistant_phase) = 1;
          - script.execute: show_home_if_no_event
  on_listening:
    - if:
        condition:
          lambda: return id(wake_engine_select).state == "microwakeword" || id(openwakeword_wake_detected);
        then:
          - lambda: id(voice_assistant_phase) = 2;
          - text_sensor.template.publish:
              id: connection_status_text
              state: "Listening"
          - script.execute: show_voice_page
        else:
          - lambda: id(voice_assistant_phase) = 1;
          - script.execute: show_home_if_no_event
  on_stt_vad_start:
    - if:
        condition:
          lambda: return id(wake_engine_select).state == "microwakeword" || id(openwakeword_wake_detected);
        then:
          - lambda: id(voice_assistant_phase) = 3;
          - text_sensor.template.publish:
              id: connection_status_text
              state: "Hearing you"
          - script.execute: show_voice_page
  on_stt_vad_end:
    - if:
        condition:
          lambda: return id(wake_engine_select).state == "microwakeword" || id(openwakeword_wake_detected);
        then:
          - lambda: id(voice_assistant_phase) = 4;
          - text_sensor.template.publish:
              id: connection_status_text
              state: "Thinking"
          - script.execute: show_voice_page
  on_tool_call_start:
    - if:
        condition:
          lambda: return id(wake_engine_select).state == "microwakeword" || id(openwakeword_wake_detected);
        then:
          - lambda: id(voice_assistant_phase) = 6;
    - lambda: |-
        id(event_visible) = true;
        id(event_until_ms) = millis() + 30000U;
    - text_sensor.template.publish:
        id: event_kind_text
        state: "tool_call"
    - text_sensor.template.publish:
        id: tool_name_text
        state: !lambda |-
          if (!x.empty()) {
            return x;
          }
          return std::string("${tater_first_name} is working");
    - text_sensor.template.publish:
        id: event_message_text
        state: "I'm working on that now."
    - text_sensor.template.publish:
        id: tool_step_text
        state: "running"
  on_intent_progress:
    - if:
        condition:
          and:
            - lambda: "return !x.empty();"
            - lambda: return id(wake_engine_select).state == "microwakeword" || id(openwakeword_wake_detected);
        then:
          - lambda: id(voice_assistant_phase) = 5;
          - text_sensor.template.publish:
              id: connection_status_text
              state: "Replying"
          - script.execute: show_voice_page
  on_tts_start:
    - if:
        condition:
          lambda: return id(wake_engine_select).state == "microwakeword" || id(openwakeword_wake_detected);
        then:
          - lambda: id(voice_assistant_phase) = 5;
          - text_sensor.template.publish:
              id: connection_status_text
              state: "Replying"
          - script.execute: show_voice_page
  on_end:
    - wait_until:
        condition:
          - media_player.is_announcing:
              id: speaker_media_player
        timeout: 0.5s
    - wait_until:
        condition:
          and:
            - not:
                media_player.is_announcing:
                  id: speaker_media_player
            - not:
                speaker.is_playing:
                  id: box_speaker
    - script.execute: apply_wake_engine
    - lambda: |-
        id(openwakeword_wake_detected) = false;
        id(voice_assistant_phase) = 1;
    - text_sensor.template.publish:
        id: connection_status_text
        state: "Voice ready"
    - script.execute: show_home_if_no_event

switch:
  - platform: gpio
    id: speaker_enable_switch
    name: Speaker Enable
    pin:
      number: GPIO46
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    disabled_by_default: true

  - platform: template
    id: master_mute_switch
    name: Microphone Mute
    icon: mdi:microphone-off
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - microphone.mute:
      - text_sensor.template.publish:
          id: connection_status_text
          state: "Muted"
    turn_off_action:
      - microphone.unmute:
      - text_sensor.template.publish:
          id: connection_status_text
          state: "Voice ready"

  - platform: template
    id: capture_wake_audio
    name: Capture Wake Audio
    icon: mdi:waveform
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: id(mww).set_capture_upload_enabled(true);
    turn_off_action:
      - lambda: id(mww).set_capture_upload_enabled(false);

  - platform: template
    id: capture_close_misses
    name: Capture Close Misses
    icon: mdi:target
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: id(mww).set_capture_close_misses_enabled(true);
    turn_off_action:
      - lambda: id(mww).set_capture_close_misses_enabled(false);

text:
  - platform: template
    id: tater_display_url
    name: Tater Display URL
    icon: mdi:monitor-dashboard
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: "${tater_base_url}"
    mode: TEXT
    max_length: 255
    set_action:
      - script.execute: fetch_tater_feed
      - script.wait: fetch_tater_feed
      - script.execute: fetch_tater_events

  - platform: template
    id: trainer_app_url
    name: Trainer App URL
    icon: mdi:lan-connect
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: "http://trainer.local:8789"
    mode: TEXT
    max_length: 255
    set_action:
      - lambda: id(mww).set_capture_upload_url(x);

  - platform: template
    id: microwakeword_model_url
    name: microWakeWord Model URL
    icon: mdi:file-cloud
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: "${wake_word_model_url}"
    mode: TEXT
    max_length: 255
    set_action:
      - lambda: id(mww).set_runtime_model_url(x);

  - platform: template
    id: openwakeword_server_url
    name: openWakeWord Server URL
    icon: mdi:server-network
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: "${openwakeword_server_url}"
    mode: TEXT
    max_length: 255
    set_action:
      - lambda: |-
          if (id(wake_engine_select).state == "openwakeword") {
            id(oww).set_url(x);
          }

  - platform: template
    id: nanowakeword_server_url
    name: NanoWakeWord Server URL
    icon: mdi:server-network
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: "${nanowakeword_server_url}"
    mode: TEXT
    max_length: 255
    set_action:
      - lambda: |-
          if (id(wake_engine_select).state == "nanowakeword") {
            id(oww).set_url(x);
          }

number:
  - platform: template
    id: display_brightness
    name: Display Brightness
    icon: mdi:brightness-6
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 100
    min_value: 10
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    set_action:
      - light.turn_on:
          id: lcd_backlight
          brightness: !lambda |-
            float brightness = x;
            if (brightness < 10.0f) {
              brightness = 10.0f;
            }
            if (brightness > 100.0f) {
              brightness = 100.0f;
            }
            return brightness / 100.0f;

  - platform: template
    id: close_miss_threshold
    name: Close Miss Threshold
    icon: mdi:target-variant
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 0.78
    min_value: 0.50
    max_value: 0.95
    step: 0.01
    set_action:
