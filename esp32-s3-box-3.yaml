script:
  - id: apply_wake_engine
    mode: restart
    then:
      - if:
          condition:
            lambda: return id(voice_api_connected);
          then:
            - if:
                condition:
                  lambda: return id(wake_engine_select).state != "microwakeword";
                then:
                  - micro_wake_word.stop:
                  - wait_until:
                      condition:
                        lambda: return !id(mww).is_running();
                  - if:
                      condition:
                        voice_assistant.is_running:
                      then:
                        - voice_assistant.stop:
                        - delay: 150ms
                  - remote_wake_word.stop:
                  - wait_until:
                      condition:
                        lambda: return !id(oww).is_running();
                  - lambda: |-
                      id(openwakeword_wake_detected) = false;
                      id(voice_assistant_phase) = 1;
                      id(va).set_use_wake_word(false);
                      if (id(wake_engine_select).state == "nanowakeword") {
                        id(oww).set_url(id(nanowakeword_server_url).state);
                        id(oww).set_stream_path("/api/nanowakeword/stream");
                      } else {
                        id(oww).set_url(id(openwakeword_server_url).state);
                        id(oww).set_stream_path("/api/openwakeword/stream");
                      }
                  - logger.log:
                      level: INFO
                      tag: tater.voice
                      format: "Using remote wake endpoint (%s)."
                      args: ['(id(wake_engine_select).state == "nanowakeword" ? id(nanowakeword_server_url).state : id(openwakeword_server_url).state).c_str()']
                  - remote_wake_word.start:
                else:
                  - if:
                      condition:
                        voice_assistant.is_running:
                      then:
                        - voice_assistant.stop:
                  - delay: 150ms
                  - remote_wake_word.stop:
                  - wait_until:
                      condition:
                        lambda: return !id(oww).is_running();
                  - lambda: |-
                      id(openwakeword_wake_detected) = false;
                      id(va).set_use_wake_word(false);
                  - if:
                      condition:
                        switch.is_off: master_mute_switch
                      then:
                        - micro_wake_word.start:

  - id: recover_openwakeword_after_fallback
    mode: restart
    then:
      - lambda: |-
          id(openwakeword_wake_detected) = false;
          id(voice_assistant_phase) = 1;
          id(va).set_use_wake_word(false);
      - remote_wake_word.stop:
      - wait_until:
          condition:
            lambda: return !id(oww).is_running();
      - if:
          condition:
            lambda: return id(wake_engine_select).state != "microwakeword";
          then:
            - if:
                condition:
                  switch.is_off: master_mute_switch
                then:
                  - micro_wake_word.start:
            - delay: 60s
            - if:
                condition:
                  lambda: return id(wake_engine_select).state != "microwakeword";
                then:
                  - logger.log:
                      level: INFO
                      tag: tater.voice
                      format: "Retrying remote wake endpoint (%s)."
                      args: ['(id(wake_engine_select).state == "nanowakeword" ? id(nanowakeword_server_url).state : id(openwakeword_server_url).state).c_str()']
                  - script.execute: apply_wake_engine

  - id: refresh_clock
    mode: restart
    then:
      - lvgl.label.update:
          id: clock_label
          text:
            time_format: "%I:%M"
            time: local_time
      - lvgl.label.update:
          id: date_label
          text:
            time_format: "%a %b %d"
            time: local_time

  - id: mark_tater_http_success
    mode: restart
    then:
      - lambda: |-
          id(tater_http_failures) = 0;
      - if:
          condition:
            lambda: return id(voice_assistant_phase) <= 1 || id(voice_assistant_phase) >= 10;
          then:
            - text_sensor.template.publish:
                id: connection_status_text
                state: "Tater online"

  - id: mark_tater_http_failure
    mode: restart
    then:
      - lambda: |-
          if (id(tater_http_failures) < 1000) {
            id(tater_http_failures) += 1;
          }
          ESP_LOGW("tater.display", "Display HTTP miss %d/3; keeping last known screen data.", id(tater_http_failures));
      - if:
          condition:
            lambda: return id(tater_http_failures) >= 3 && (id(voice_assistant_phase) <= 1 || id(voice_assistant_phase) >= 10);
          then:
            - text_sensor.template.publish:
                id: connection_status_text
                state: "Tater offline"

  - id: update_voice_visual
    mode: restart
    then:
      - lvgl.label.update:
          id: voice_title_label
          text: !lambda |-
            switch (id(voice_assistant_phase)) {
              case 3:
                return "Hearing you";
              case 4:
                return "Thinking";
              case 5:
                return "Replying";
              case 11:
                return "Voice error";
              case 2:
              default:
                return "Listening";
            }
      - lvgl.label.update:
          id: voice_subtitle_label
          text: !lambda |-
            switch (id(voice_assistant_phase)) {
              case 3:
                return "Keep talking.";
              case 4:
                return "Working through it.";
              case 5:
                return "Sending the answer.";
              case 11:
                return "Voice needs attention.";
              case 2:
              default:
                return "Say it, I'm listening.";
            }
      - lvgl.label.update:
          id: voice_motion_label
          text: !lambda |-
            static const char * const listening[] = {
              "o        .        o",
              "  o      .      o  ",
              "    o    .    o    ",
              "      o  .  o      ",
              "        o.o        ",
              "      o  .  o      "
            };
            static const char * const hearing[] = {
              "|  ||  |||  ||  |",
              "|| ||| |||| ||| ||",
              "||| ||||||||| |||",
              "|| ||| |||| ||| ||",
              "|  ||  |||  ||  |",
              "   |   |||   |   "
            };
            static const char * const thinking[] = {
              "o  --------    ",
              "  o  ------    ",
              "    o  ----    ",
              "      o  --    ",
              "        o      ",
              "      --  o    "
            };
            static const char * const replying[] = {
              "--__--__--__--",
              "__--__--__--__",
              "-_--_--_--_--",
              "_--_--_--_--_",
              "--__--__--__--",
              "__--__--__--__"
            };
            static const char * const error[] = {
              "x      x      x",
              "  x    x    x  ",
              "    x  x  x    ",
              "      xxx      ",
              "    x  x  x    ",
              "  x    x    x  "
            };
            int frame = id(voice_animation_frame) % 6;
            switch (id(voice_assistant_phase)) {
              case 3:
                return hearing[frame];
              case 4:
                return thinking[frame];
              case 5:
                return replying[frame];
              case 11:
                return error[frame];
              case 2:
              default:
                return listening[frame];
            }

  - id: show_voice_page
    mode: restart
    then:
      - if:
          condition:
            lambda: return !id(event_visible);
          then:
            - script.execute: update_voice_visual
            - lvgl.page.show: voice_page

  - id: show_home_if_no_event
    mode: restart
    then:
      - if:
          condition:
            lambda: return !id(event_visible) && ((id(voice_assistant_phase) >= 2 && id(voice_assistant_phase) <= 5) || id(voice_assistant_phase) == 11);
          then:
            - script.execute: show_voice_page
          else:
            - if:
                condition:
                  lambda: return !id(event_visible);
                then:
                  - lvgl.page.show: home_page

  - id: fetch_tater_feed
    mode: single
    then:
      - http_request.get:
          url: !lambda |-
            std::string base = id(tater_display_url).state;
            if (base.empty()) {
              base = "${tater_base_url}";
            }
            if (base.compare(0, 5, "http:") == 0 && base.compare(0, 7, "http://") != 0) {
              std::string rest = base.substr(5);
              while (!rest.empty() && rest.front() == '/') {
                rest.erase(0, 1);
              }
              base = "http://" + rest;
            } else if (base.compare(0, 6, "https:") == 0 && base.compare(0, 8, "https://") != 0) {
              std::string rest = base.substr(6);
              while (!rest.empty() && rest.front() == '/') {
                rest.erase(0, 1);
              }
              base = "https://" + rest;
            } else if (base.compare(0, 7, "http://") != 0 && base.compare(0, 8, "https://") != 0) {
              base = "http://" + base;
            }
            while (!base.empty() && base.back() == '/') {
              base.pop_back();
            }
            return base + "/tater-ha/v1/display/feed"
              + "?target=${display_target}"
              + "&selector=${display_target}"
              + "&format=compact";
          request_headers:
            X-Tater-Token: "${tater_token}"
          capture_response: true
          max_response_buffer_size: 2048
          on_response:
            then:
              - if:
                  condition:
                    lambda: return response->status_code == 200 && !body.empty();
                  then:
                    - script.execute: mark_tater_http_success
                    - lambda: |-
                        json::parse_json(body, [](JsonObject root) -> bool {
                          JsonObject text = root["text"].as<JsonObject>();
                          auto get_text = [&](const char *key) -> const char * {
                            const char *value = text[key] | "";
                            if (value == nullptr || value[0] == '\0') {
                              return "--";
                            }
                            return value;
                          };
                          id(temp_out_text).publish_state(get_text("temp_out"));
                          id(temp_in_text).publish_state(get_text("temp_in"));
                          id(humidity_out_text).publish_state(get_text("humidity_out"));
                          id(humidity_in_text).publish_state(get_text("humidity_in"));
                          id(wind_text).publish_state(get_text("wind_speed"));
                          id(rain_text).publish_state(get_text("rain_rate"));
                          id(lightning_text).publish_state(get_text("lightning_strikes"));
                          return true;
                        });
                  else:
                    - script.execute: mark_tater_http_failure
          on_error:
            then:
              - script.execute: mark_tater_http_failure

  - id: fetch_tater_events
    mode: single
    then:
      - http_request.get:
          url: !lambda |-
            std::string base = id(tater_display_url).state;
            if (base.empty()) {
              base = "${tater_base_url}";
            }
            if (base.compare(0, 5, "http:") == 0 && base.compare(0, 7, "http://") != 0) {
              std::string rest = base.substr(5);
              while (!rest.empty() && rest.front() == '/') {
                rest.erase(0, 1);
              }
              base = "http://" + rest;
            } else if (base.compare(0, 6, "https:") == 0 && base.compare(0, 8, "https://") != 0) {
              std::string rest = base.substr(6);
              while (!rest.empty() && rest.front() == '/') {
                rest.erase(0, 1);
              }
              base = "https://" + rest;
            } else if (base.compare(0, 7, "http://") != 0 && base.compare(0, 8, "https://") != 0) {
              base = "http://" + base;
            }
            while (!base.empty() && base.back() == '/') {
              base.pop_back();
            }
            return base + "/tater-ha/v1/display/events"
              + "?target=${display_target}"
              + "&after_seq=" + std::to_string(id(last_event_seq))
              + "&limit=4";
          request_headers:
            X-Tater-Token: "${tater_token}"
          capture_response: true
          on_response:
            then:
              - if:
                  condition:
                    lambda: return response->status_code == 200 && !body.empty();
                  then:
                    - script.execute: mark_tater_http_success
                    - lambda: |-
                        json::parse_json(body, [](JsonObject root) -> bool {
                          int last_seq = root["last_seq"] | id(last_event_seq);
                          if (last_seq > id(last_event_seq)) {
                            id(last_event_seq) = last_seq;
                          }

                          JsonArray events = root["events"].as<JsonArray>();
                          if (events.size() == 0) {
                            return true;
                          }

                          JsonObject event = events[events.size() - 1].as<JsonObject>();
                          const char *kind = event["kind"] | "notification";
                          const char *title = event["title"] | "";
                          const char *message = event["message"] | "";
                          const char *description = event["description"] | "";
                          const char *priority = event["priority"] | "normal";
                          const char *image_url = event["image_url"] | "";
                          const char *tool = event["tool"] | "";
                          int step_index = event["step_index"] | 0;
                          int step_total = event["step_total"] | 0;
                          int ttl = event["ttl_seconds"] | 18;

                          std::string kind_text = kind == nullptr ? "notification" : std::string(kind);
                          if (title == nullptr || title[0] == '\0') {
                            title = kind_text == "tool_call" ? "Tool Call" : "${tater_first_name}";
                          }
                          std::string message_text = message == nullptr ? "" : std::string(message);
                          std::string description_text = description == nullptr ? "" : std::string(description);
                          if (message_text.empty() && !description_text.empty()) {
                            message_text = description_text;
                          }
                          if (description_text == message_text) {
                            description_text.clear();
                          }

                          id(event_title_text).publish_state(title);
                          id(event_message_text).publish_state(message_text);
                          id(event_description_text).publish_state(description_text);
                          id(event_priority_text).publish_state(priority == nullptr ? "normal" : priority);

                          std::string image_url_text = image_url == nullptr ? "" : std::string(image_url);
                          auto set_image_if_empty = [&](const char *value) {
                            if (!image_url_text.empty() || value == nullptr || value[0] == '\0') {
                              return;
                            }
                            image_url_text = value;
                          };
                          set_image_if_empty(event["snapshot_url"] | "");
                          set_image_if_empty(event["thumbnail_url"] | "");
                          JsonObject meta = event["meta"].as<JsonObject>();
                          if (!meta.isNull()) {
                            set_image_if_empty(meta["image_url"] | "");
                            set_image_if_empty(meta["snapshot_url"] | "");
                            set_image_if_empty(meta["thumbnail_url"] | "");
                          }
                          JsonObject data = event["data"].as<JsonObject>();
                          if (!data.isNull()) {
                            set_image_if_empty(data["image_url"] | "");
                            set_image_if_empty(data["snapshot_url"] | "");
                            set_image_if_empty(data["thumbnail_url"] | "");
                          }
                          if (image_url_text.empty()) {
                            const char *snapshot_id = event["snapshot_id"] | "";
                            if ((snapshot_id == nullptr || snapshot_id[0] == '\0') && !data.isNull()) {
                              snapshot_id = data["snapshot_id"] | "";
                            }
                            if ((snapshot_id == nullptr || snapshot_id[0] == '\0') && !meta.isNull()) {
                              snapshot_id = meta["snapshot_id"] | "";
                            }
                            if (snapshot_id != nullptr && snapshot_id[0] != '\0') {
                              image_url_text = std::string("/tater-ha/v1/display/snapshots/") + snapshot_id;
                            }
                          }
                          if (!image_url_text.empty()) {
                            auto normalize_base = []() -> std::string {
                              std::string base = id(tater_display_url).state;
                              if (base.empty()) {
                                base = "${tater_base_url}";
                              }
                              if (base.compare(0, 5, "http:") == 0 && base.compare(0, 7, "http://") != 0) {
                                std::string rest = base.substr(5);
                                while (!rest.empty() && rest.front() == '/') {
                                  rest.erase(0, 1);
                                }
                                base = "http://" + rest;
                              } else if (base.compare(0, 6, "https:") == 0 && base.compare(0, 8, "https://") != 0) {
                                std::string rest = base.substr(6);
                                while (!rest.empty() && rest.front() == '/') {
                                  rest.erase(0, 1);
                                }
                                base = "https://" + rest;
                              } else if (base.compare(0, 7, "http://") != 0 && base.compare(0, 8, "https://") != 0) {
                                base = "http://" + base;
                              }
                              while (!base.empty() && base.back() == '/') {
                                base.pop_back();
                              }
                              return base;
                            };
                            if (image_url_text.compare(0, 5, "http:") == 0 && image_url_text.compare(0, 7, "http://") != 0) {
                              std::string rest = image_url_text.substr(5);
                              while (!rest.empty() && rest.front() == '/') {
                                rest.erase(0, 1);
                              }
                              image_url_text = "http://" + rest;
                            } else if (image_url_text.compare(0, 6, "https:") == 0 && image_url_text.compare(0, 8, "https://") != 0) {
                              std::string rest = image_url_text.substr(6);
                              while (!rest.empty() && rest.front() == '/') {
                                rest.erase(0, 1);
                              }
                              image_url_text = "https://" + rest;
                            } else if (image_url_text.front() == '/') {
                              image_url_text = normalize_base() + image_url_text;
                            } else if (image_url_text.compare(0, 7, "http://") != 0 && image_url_text.compare(0, 8, "https://") != 0) {
                              image_url_text = normalize_base() + "/" + image_url_text;
                            }
                          }
                          id(event_image_url_text).publish_state(image_url_text);
                          id(tool_name_text).publish_state(
                            tool != nullptr && tool[0] != '\0' ? tool : "${tater_first_name} is working"
                          );

                          static char step_buf[16];
                          if (step_index > 0 && step_total > 0) {
                            snprintf(step_buf, sizeof(step_buf), "%d/%d", step_index, step_total);
                          } else {
                            snprintf(step_buf, sizeof(step_buf), "running");
                          }
                          id(tool_step_text).publish_state(step_buf);

                          id(event_visible) = true;
                          if (ttl < 6) {
                            ttl = 6;
                          }
                          if (ttl > 90) {
                            ttl = 90;
                          }
                          id(event_until_ms) = millis() + (uint32_t) ttl * 1000U;
                          id(event_kind_text).publish_state(kind);
                          return true;
                        });
                  else:
                    - script.execute: mark_tater_http_failure
          on_error:
            then:
              - script.execute: mark_tater_http_failure

  - id: animate_tool_call
    mode: restart
    then:
      - lambda: |-
          id(tool_animation_frame) = (id(tool_animation_frame) + 1) % 6;
      - lvgl.label.update:
          id: tool_motion_label
          text: !lambda |-
            static const char * const frames[] = {
              "o                o",
              "  o            o  ",
              "    o        o    ",
              "      o    o      ",
              "        oo        ",
              "      o    o      "
            };
            return frames[id(tool_animation_frame)];

  - id: animate_voice_pipeline
    mode: restart
    then:
      - lambda: |-
          id(voice_animation_frame) = (id(voice_animation_frame) + 1) % 6;
      - script.execute: update_voice_visual

interval:
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: return !id(event_visible) && ((id(voice_assistant_phase) >= 2 && id(voice_assistant_phase) <= 5) || id(voice_assistant_phase) == 11);
          then:
            - script.execute: animate_voice_pipeline

  - interval: 1s
    then:
      - script.execute: refresh_clock
      - if:
          condition:
            lambda: return id(event_visible) && id(event_until_ms) != 0 && millis() > id(event_until_ms);
          then:
            - lambda: |-
                id(event_visible) = false;
                id(event_until_ms) = 0;
            - script.execute: show_home_if_no_event
      - if:
          condition:
            lambda: return id(event_visible) && id(event_kind_text).state == "tool_call";
          then:
            - script.execute: animate_tool_call

  - interval: 15s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lambda: |-
                id(display_poll_tick) = (id(display_poll_tick) + 1) % 4;
            - if:
                condition:
                  lambda: return id(display_poll_tick) == 0;
                then:
                  - script.execute: fetch_tater_feed
                else:
                  - script.execute: fetch_tater_events

display:
  - platform: mipi_spi
    id: s3_box_lcd
    model: S3BOX
    data_rate: 40MHz
    cs_pin: GPIO5
    dc_pin: GPIO4
    reset_pin:
      number: GPIO48
      inverted: true
    invert_colors: false
    auto_clear_enabled: false
    update_interval: never

