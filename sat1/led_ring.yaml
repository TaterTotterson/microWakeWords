globals:
  # Global index for our LEDs. So that switching between different animation does not lead to unwanted effects.
  - id: global_led_animation_index
    type: int
    restore_value: no
    initial_value: '0'
  # Global variable tracking if the jack has been plugged touched.
  - id: jack_plugged_recently
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking if the jack has been unplugged touched.
  - id: jack_unplugged_recently
    type: bool
    restore_value: no
    initial_value: 'false'

light:
  # Hardware LED ring. Not used because remapping needed
  - platform: esp32_rmt_led_strip
    id: hw_led_ring
    pin: GPIO21
    num_leds: 24
    rgb_order: GRB
    chipset: WS2812

  # User facing LED ring. Remapping of the hardware LEDs.
  # Exposed to be used by the user.
  - platform: partition
    id: led_ring
    name: LED Ring
    entity_category: config
    icon: "mdi:dots-circle"
    default_transition_length: 0ms
    restore_mode: RESTORE_DEFAULT_OFF
    initial_state:
      color_mode: rgb
      brightness: 66%
      red: 9.4%
      green: 73.3%
      blue: 94.9%
    segments:
      - id: hw_led_ring
        from: 0
        to: 23

  # Voice Assistant LED ring. Remapping of the hardware LED.
  # This light is not exposed. The device controls it
  - platform: partition
    id: voice_assistant_leds
    internal: true
    default_transition_length: 0ms
    segments:
      - id: hw_led_ring
        from: 0
        to: 23
    effects:
      - addressable_lambda:
          name: "Waiting for Command"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              if (i == id(global_led_animation_index) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 23) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 22) % 24) {
                it[i] = color * 128;
              } else if (i == (id(global_led_animation_index) + 12) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 11) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 10) % 24) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 24;
      - addressable_lambda:
          name: "Listening For Command"
          update_interval: 50ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              if (i == id(global_led_animation_index) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 23) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 22) % 24) {
                it[i] = color * 128;
              } else if (i == (id(global_led_animation_index) + 12) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 11) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 10) % 24) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 24;
      - addressable_lambda:
          name: "VoD Listening"
          update_interval: 50ms
          lambda: |-
            static float animated_position = 12.0f;
            static float filtered_delay = 0.0f;
            static uint32_t last_update_ms = 0;
            static uint32_t last_valid_ms = 0;
            constexpr int num_leds = 24;
            constexpr int fade_leds = 6;
            constexpr float center_led = 12.0f;
            constexpr float side_led_span = 7.0f;
            constexpr float max_abs_delay = 1.2f;
            constexpr float delay_deadband = 0.08f;
            constexpr uint8_t min_confidence = 1;
            constexpr float delay_filter_alpha = 0.22f;
            constexpr float transition_duration = 0.25f;
            auto clamp_u8 = [](float value) -> uint8_t {
              if (value <= 0.0f) {
                return 0;
              }
              if (value >= 255.0f) {
                return 255;
              }
              return (uint8_t) value;
            };
            auto wrap_position = [](float position) -> float {
              while (position >= 24.0f) {
                position -= 24.0f;
              }
              while (position < 0.0f) {
                position += 24.0f;
              }
              return position;
            };
            auto delay_to_position = [&](float delay) -> float {
              if (delay > max_abs_delay) {
                delay = max_abs_delay;
              } else if (delay < -max_abs_delay) {
                delay = -max_abs_delay;
              }

              float normalized = delay / max_abs_delay;
              float magnitude = normalized < 0.0f ? -normalized : normalized;
              if (magnitude < delay_deadband) {
                normalized = 0.0f;
              } else {
                magnitude = (magnitude - delay_deadband) / (1.0f - delay_deadband);
                magnitude = 1.0f - ((1.0f - magnitude) * (1.0f - magnitude));
                normalized = normalized < 0.0f ? -magnitude : magnitude;
              }

              float target = center_led + (normalized * side_led_span);
              return wrap_position(target);
            };

            const uint32_t now = millis();
            float dt = 0.05f;
            if (last_update_ms != 0 && now >= last_update_ms) {
              dt = (now - last_update_ms) / 1000.0f;
            }
            last_update_ms = now;
            const bool has_valid_doa = id(xmos_doa).valid() &&
                                       id(xmos_doa).confidence() >= min_confidence;

            if (initial_run) {
              filtered_delay = id(xmos_doa).sample_delay();
              animated_position = has_valid_doa
                  ? (id(xmos_doa).four_mic() ? (float) id(xmos_doa).led_index() : delay_to_position(filtered_delay))
                  : center_led;
              last_valid_ms = has_valid_doa ? now : 0;
              dt = 0.0f;
            }

            if (has_valid_doa) {
              float target_position;
              if (id(xmos_doa).four_mic()) {
                filtered_delay = id(xmos_doa).sample_delay();
                target_position = id(xmos_doa).led_index();
              } else {
                filtered_delay += (id(xmos_doa).sample_delay() - filtered_delay) * delay_filter_alpha;
                target_position = delay_to_position(filtered_delay);
              }
              last_valid_ms = now;

              float diff = target_position - animated_position;
              if (diff > num_leds / 2.0f) {
                diff -= num_leds;
              } else if (diff < -num_leds / 2.0f) {
                diff += num_leds;
              }
              if (diff > 0.01f || diff < -0.01f) {
                animated_position += (diff / transition_duration) * dt;
              } else {
                animated_position = target_position;
              }
            } else if (last_valid_ms == 0 || now - last_valid_ms > 1000) {
              float diff = center_led - animated_position;
              if (diff > num_leds / 2.0f) {
                diff -= num_leds;
              } else if (diff < -num_leds / 2.0f) {
                diff += num_leds;
              }
              animated_position += diff * 0.08f;
            }

            animated_position = wrap_position(animated_position);

            auto light_color = id(led_ring).current_values;
            float selected_r = light_color.get_red() * 255.0f;
            float selected_g = light_color.get_green() * 255.0f;
            float selected_b = light_color.get_blue() * 255.0f;

            for (int i = 0; i < num_leds; i++) {
              float dist = i - animated_position;
              if (dist < 0.0f) {
                dist = -dist;
              }
              if (dist > num_leds / 2.0f) {
                dist = num_leds - dist;
              }

              // Same shape as the XVF3800 beam, scaled from 12 LEDs to the Sat1's 24 LED ring.
              float base_level = 0.06f;
              float beam_level = 1.0f - (dist / (fade_leds + 1.0f));
              if (beam_level < 0.0f) {
                beam_level = 0.0f;
              }
              beam_level *= 0.65f;

              float center_level = 1.0f - (dist / 2.40f);
              if (center_level < 0.0f) {
                center_level = 0.0f;
              }

              float color_level = base_level + beam_level;
              float r = selected_r * color_level + 255.0f * center_level;
              float g = selected_g * color_level + 240.0f * center_level;
              float b = selected_b * color_level + 170.0f * center_level;
              it[i] = Color(clamp_u8(r), clamp_u8(g), clamp_u8(b));
            }
      - addressable_lambda:
          name: "Thinking"
          update_interval: 80ms
          lambda: |-
            static uint8_t tick = 0;
            static float led_levels[24] = {};
            if (initial_run) {
              tick = 0;
              for (int i = 0; i < 24; i++) {
                led_levels[i] = 0.0f;
              }
            }

            auto clamp_u8 = [](float value) -> uint8_t {
              if (value <= 0.0f) {
                return 0;
              }
              if (value >= 255.0f) {
                return 255;
              }
              return (uint8_t) value;
            };

            auto light_color = id(led_ring).current_values;
            const float selected_r = light_color.get_red() * 255.0f;
            const float selected_g = light_color.get_green() * 255.0f;
            const float selected_b = light_color.get_blue() * 255.0f;

            const uint8_t breath_step = tick % 18;
            const uint8_t breath = breath_step <= 9 ? breath_step : 18 - breath_step;

            for (int i = 0; i < 24; i++) {
              float target_level = 0.025f + ((float) breath * 0.006f);

              const uint8_t bit_phase = (uint8_t) ((i * 7 + tick * 5) % 29);
              if (bit_phase == 0) {
                target_level += 0.86f;
              } else if (bit_phase == 1 || bit_phase == 28) {
                target_level += 0.46f;
              }

              const uint8_t calc_phase = (uint8_t) ((i * 5 + tick * 2) % 17);
              if (calc_phase == 0 || calc_phase == 8) {
                target_level += 0.50f;
              } else if (calc_phase == 1 || calc_phase == 9) {
                target_level += 0.24f;
              }

              if (target_level > 1.0f) {
                target_level = 1.0f;
              }

              const float alpha = target_level > led_levels[i] ? 0.58f : 0.20f;
              led_levels[i] += (target_level - led_levels[i]) * alpha;

              float color_level = led_levels[i];
              if (color_level > 1.0f) {
                color_level = 1.0f;
              }

              float white_level = color_level > 0.55f ? (color_level - 0.55f) * 0.46f : 0.0f;

              float r = selected_r * color_level + 255.0f * white_level;
              float g = selected_g * color_level + 240.0f * white_level;
              float b = selected_b * color_level + 170.0f * white_level;
              it[i] = Color(clamp_u8(r), clamp_u8(g), clamp_u8(b));
            }

            tick++;
      - addressable_lambda:
          name: "Tool Call"
          update_interval: 80ms
          lambda: |-
            static bool moving_forward = true;
            if (initial_run) {
              id(global_led_animation_index) = 0;
              moving_forward = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            uint8_t lead_a = id(global_led_animation_index) % 12;
            uint8_t lead_b = (23 - lead_a) % 24;
            uint8_t trail_a = moving_forward ? (24 + lead_a - 1) % 24 : (lead_a + 1) % 24;
            uint8_t trail_b = moving_forward ? (lead_b + 1) % 24 : (24 + lead_b - 1) % 24;
            uint8_t tail_a = moving_forward ? (24 + lead_a - 2) % 24 : (lead_a + 2) % 24;
            uint8_t tail_b = moving_forward ? (lead_b + 2) % 24 : (24 + lead_b - 2) % 24;
            for (int i = 0; i < 24; i++) {
              if (i == lead_a || i == lead_b) {
                it[i] = color;
              } else if (i == trail_a || i == trail_b) {
                it[i] = color * 192;
              } else if (i == tail_a || i == tail_b) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (moving_forward) {
              if (id(global_led_animation_index) >= 11) {
                id(global_led_animation_index) = 10;
                moving_forward = false;
              } else {
                id(global_led_animation_index) += 1;
              }
            } else {
              if (id(global_led_animation_index) <= 0) {
                id(global_led_animation_index) = 1;
                moving_forward = true;
              } else {
                id(global_led_animation_index) -= 1;
              }
            }
      - addressable_lambda:
          name: "Replying"
          update_interval: 40ms
          lambda: |-
            static float smoothed_radius = 2.0f;
            if (initial_run) {
              smoothed_radius = 2.0f;
            }

            auto clamp_u8 = [](float value) -> uint8_t {
              if (value <= 0.0f) {
                return 0;
              }
              if (value >= 255.0f) {
                return 255;
              }
              return (uint8_t) value;
            };
            auto ring_distance = [](int a, int b) -> int {
              int dist = a - b;
              if (dist < 0) {
                dist = -dist;
              }
              return dist > 12 ? 24 - dist : dist;
            };

            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 24;
            constexpr int center = 12;
            float audio_level = id(i2s_audio_speaker).audio_level() * 5.5f;
            if (audio_level > 1.0f) {
              audio_level = 1.0f;
            }
            float volume_level = id(external_media_player).volume;
            if (id(external_media_player).is_muted()) {
              audio_level = 0.0f;
              volume_level = 0.0f;
            }
            float target_radius = 1.25f + (audio_level * 6.5f) + (volume_level * 1.25f);
            if (target_radius > 9.0f) {
              target_radius = 9.0f;
            }
            float alpha = target_radius > smoothed_radius ? 0.45f : 0.20f;
            smoothed_radius += (target_radius - smoothed_radius) * alpha;

            auto light_color = id(led_ring).current_values;
            const float selected_r = light_color.get_red() * 255.0f;
            const float selected_g = light_color.get_green() * 255.0f;
            const float selected_b = light_color.get_blue() * 255.0f;

            for (int i = 0; i < 24; i++) {
              int dist = ring_distance(i, center);
              float level = smoothed_radius - (float) dist;
              if (level <= 0.0f) {
                it[i] = Color::BLACK;
                continue;
              }

              if (level > 1.0f) {
                level = 1.0f;
              }
              float ripple = 0.86f + (0.14f * ((id(global_led_animation_index) + dist * 5) % 4) / 3.0f);
              float color_level = (0.12f + (level * 0.76f)) * ripple;
              float center_level = 1.0f - ((float) dist / 2.4f);
              if (center_level < 0.0f) {
                center_level = 0.0f;
              }
              center_level *= 0.52f;

              float r = selected_r * color_level + 255.0f * center_level;
              float g = selected_g * color_level + 240.0f * center_level;
              float b = selected_b * color_level + 170.0f * center_level;
              it[i] = Color(clamp_u8(r), clamp_u8(g), clamp_u8(b));
            }
      - addressable_lambda:
          name: "Muted or Silent"
          update_interval: 16ms
          lambda: |-
            static int8_t index = 0;
            Color muted_color(255, 0, 0);
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              if ( light_color.get_state() ) {
                it[i] = color;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if ( id(master_mute_switch).state ) {
              it[23] = Color::BLACK;
              it[0] = muted_color;
              it[1] = Color::BLACK;
              it[5] = Color::BLACK;
              it[6] = muted_color;
              it[7] = Color::BLACK;
              it[11] = Color::BLACK;
              it[12] = muted_color;
              it[13] = Color::BLACK;
              it[17] = Color::BLACK;
              it[18] = muted_color;
              it[19] = Color::BLACK;
            }
            if ( id(external_media_player).volume == 0.0f || id(external_media_player).is_muted() ) {
              it[1] = Color::BLACK;
              it[2] = muted_color;
              it[3] = muted_color;
              it[4] = muted_color;
              it[5] = Color::BLACK;
              it[7] = Color::BLACK;
              it[8] = muted_color;
              it[9] = muted_color;
              it[10] = muted_color;
              it[11] = Color::BLACK;
              it[13] = Color::BLACK;
              it[14] = muted_color;
              it[15] = muted_color;
              it[16] = muted_color;
              it[17] = Color::BLACK;
              it[19] = Color::BLACK;
              it[20] = muted_color;
              it[21] = muted_color;
              it[22] = muted_color;
              it[23] = Color::BLACK;
            }
      - addressable_lambda:
          name: "Volume Display"
          update_interval: 50ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color silenced_color(255, 0, 0);
            auto volume_ratio = 24.0f * id(external_media_player).volume;
            for (int i = 0; i < 24; i++) {
              if (i <= volume_ratio) {
                it[(0+i)%24] = color * min( 255.0f * (volume_ratio - i) , 255.0f ) ;
              } else {
                it[(0+i)%24] = Color::BLACK;
              }
            }
            if (id(external_media_player).volume == 0.0f) {
              it[0] = silenced_color;
            }
      - addressable_lambda:
          name: "Action Button Touched"
          update_interval: 16ms
          lambda: |-
            if (initial_run) {
              // set voice_assistant_leds light to colors based on led_ring
              auto led_ring_cv = id(led_ring).current_values;
              auto va_leds_call = id(voice_assistant_leds).make_call();
              va_leds_call.from_light_color_values(led_ring_cv);
              va_leds_call.set_brightness( min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f ) );
              va_leds_call.set_state(true);
              va_leds_call.perform();
            }
            auto light_color = id(voice_assistant_leds).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              it[i] = color;
            }
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 50%
      - addressable_lambda:
          name: "Error"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            Color error_color(255, 0, 0);
            for (int i = 0; i < 24; i++) {
              it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Success"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            static uint8_t counter = 0;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
              counter = 0;
            }
            Color error_color(0, 255, 0);
            for (int i = 0; i < 24; i++) {
              it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }

      - addressable_lambda:
          name: "Warning"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            static uint8_t blink_count = 0;  // New counter for blink cycles
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
              blink_count = 0;
            }
            Color error_color(255, 0, 0);
            if (blink_count < 5) {  // Only blink 5 times
              for (int i = 0; i < 24; i++) {
                it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
              }
              if (brightness_decreasing) {
                brightness_step++;
              } else {
                brightness_step--;
              }
              if (brightness_step == 0 || brightness_step == brightness_step_number) {
                brightness_decreasing = !brightness_decreasing;
                if (brightness_step == 0) {  // Completed one blink cycle
                  blink_count++;
                }
              }
            } else {
              // Turn off LEDs after 5 blinks
              for (int i = 0; i < 24; i++) {
                it[i] = Color(0, 0, 0);
              }
            }
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

      - addressable_lambda:
          name: "Timer Ring"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color muted_color(255, 0, 0);
            for (int i = 0; i < 24; i++) {
              it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if ( id(master_mute_switch).state ) {
              it[3] = muted_color;
              it[9] = muted_color;
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Timer Tick"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color muted_color(255, 0, 0);
            auto timer_ratio = 24.0f * id(first_active_timer).seconds_left / max(id(first_active_timer).total_seconds , static_cast<uint32_t>(1));
            uint8_t last_led_on = static_cast<uint8_t>(ceil(timer_ratio)) - 1;
            for (int i = 0; i < 24; i++) {
              float brightness_dip = ( i == id(global_led_animation_index) % 24 && i != last_led_on ) ? 0.9f : 1.0f ;
              if (i <= timer_ratio) {
                it[i] = color * min (255.0f * brightness_dip * (timer_ratio - i) , 255.0f * brightness_dip) ;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (id(master_mute_switch).state) {
              it[2] = Color::BLACK;
              it[3] = muted_color;
              it[4] = Color::BLACK;
              it[8] = Color::BLACK;
              it[9] = muted_color;
              it[10] = Color::BLACK;
            }
            id(global_led_animation_index) = (24 + id(global_led_animation_index) - 1) % 24;
      - addressable_rainbow:
          name: "Rainbow"
          width: 24
      - addressable_lambda:
          name: "Tick"
          update_interval: 333ms
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 0, 0);
            if (initial_run) {
              index = 0;
            }
            for (int i = 0; i < 24; i++) {
              if (i <= index ) {
                it[i] = Color::BLACK;
              } else {
                it[i] = color;
              }
            }
            index = (index + 1) % 24;
      - addressable_lambda:
          name: "Flashing XMOS"
          update_interval: 333ms
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 138, 0);
            if (initial_run) {
              index = 0;
            }
            for (int i = 0; i < 24; i++) {
              if (i <= index ) {
                it[i] = Color::BLACK;
              } else {
                it[i] = color;
              }
            }
            index = id(global_led_animation_index) % 24;
      - addressable_lambda:
          name: "Factory Reset Coming Up"
          update_interval: 500ms
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 0, 0);
            if (initial_run) {
              index = 0;
            }
            for (int i = 0; i < 24; i++) {
              if (i <= index ) {
                it[i] = color;
              } else {
                it[i] = Color::BLACK;
              }
            }
            index = (index + 1) % 24;
      - addressable_lambda:
          name: "Jack Plugged"
          update_interval: 40ms
          lambda: |-
              static uint8_t index = 0;
              if (initial_run) {
                index = 0;
              }
              auto light_color = id(led_ring).current_values;
              Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                    light_color.get_blue() * 255);
              if (index <= 12) {
                for (int i = 0; i < 24; i++) {
                  if (i == index) {
                    it[i] = color;
                  } else if (i == (24 - index) % 24) {
                    it[i] = color;
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
              }
              index = (index + 1);
      - addressable_lambda:
          name: "Jack Unplugged"
          update_interval: 40ms
          lambda: |-
              static uint8_t index = 0;
              if (initial_run) {
                index = 0;
              }
              auto light_color = id(led_ring).current_values;
              Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                    light_color.get_blue() * 255);
              if (index <= 12) {
                for (int i = 0; i < 24; i++) {
                  if (i == 12 - index) {
                    it[i] = color;
                  } else if (i == (12 + index) % 24) {
                    it[i] = color;
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
              }
              index = (index + 1);

script:
  # Master script controlling the LEDs, based on different conditions : initialization in progress, wifi and api connected and voice assistant phase.
  # For the sake of simplicity and re-usability, the script calls child scripts defined below.
  # This script will be called every time one of these conditions is changing.
  - id: control_leds
    then:
      - lambda: |
          id(check_if_timers_active).execute();
          if (id(is_timer_active)){
            id(fetch_first_active_timer).execute();
          }
          if (id(xmos_flashing_state) > 0) {
            id(control_leds_xmos_flasher_state_update).execute();
          } else if (id(improv_ble_in_progress)) {
            id(control_leds_improv_ble_state).execute();
          } else if (id(init_in_progress)) {
            id(control_leds_init_state).execute();
          } else if (!id(wifi_id).is_connected() || !id(api_id).is_connected()){
            id(control_leds_no_ha_connection_state).execute();
          } else if (id(volume_buttons_touched)) {
            id(control_leds_volume_buttons_touched).execute();
          } else if (id(push_to_intercom_active)) {
            id(control_leds_push_to_intercom_phase).execute();
          } else if (id(btn_action).state) {
            id(control_leds_action_button_touched).execute();
          } else if (id(jack_plugged_recently)) {
            id(control_leds_jack_plugged_recently).execute();
          } else if (id(jack_unplugged_recently)) {
            id(control_leds_jack_unplugged_recently).execute();
          } else if (id(warning)) {
            id(control_leds_warning).execute();
          } else if (id(timer_ringing).state) {
            id(control_leds_timer_ringing).execute();
          } else if (id(voice_assistant_phase) == 2) {
            id(control_leds_voice_assistant_waiting_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == 3) {
            id(control_leds_voice_assistant_listening_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == 4) {
            id(control_leds_voice_assistant_thinking_phase).execute();
          } else if (id(voice_assistant_phase) == 6) {
            id(control_leds_voice_assistant_tool_call_phase).execute();
          } else if (id(voice_assistant_phase) == 5) {
            id(control_leds_voice_assistant_replying_phase).execute();
          } else if (id(voice_assistant_phase) == 11) {
            id(control_leds_voice_assistant_error_phase).execute();
          } else if (id(voice_assistant_phase) == 10) {
            id(control_leds_voice_assistant_not_ready_phase).execute();
          } else if (id(is_timer_active)) {
            id(control_leds_timer_ticking).execute();
          } else if (id(master_mute_switch).state) {
            id(control_leds_muted_or_silent).execute();
          } else if (id(external_media_player).volume == 0.0f || id(external_media_player).is_muted()) {
            id(control_leds_muted_or_silent).execute();
          } else if (id(voice_assistant_phase) == 1) {
            id(control_leds_voice_assistant_idle_phase).execute();
          }

  # Script executed during Improv BLE
  # Warm White Twinkle
  - id: control_leds_improv_ble_state
    then:
      - light.turn_on:
          brightness: 66%
          red: 100%
          green: 89%
          blue: 71%
          id: voice_assistant_leds
          effect: "Twinkle"

  # Script executed during initialization
  # Blue Twinkle if Wifi is connected, Else solid warm white
  - id: control_leds_init_state
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                brightness: 66%
                red: 9.4%
                green: 73.3%
                blue: 94.9%
                id: voice_assistant_leds
                effect: "Twinkle"
          else:
            - light.turn_on:
                brightness: 33%
                red: 100%
                green: 89%
                blue: 71%
                id: voice_assistant_leds
                effect: "none"

  # Script executed when the device has no connection to Home Assistant
  # Red Twinkle (This will be visible during HA updates for example)
  - id: control_leds_no_ha_connection_state
    then:
      - light.turn_on:
          brightness: 66%
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Twinkle"

  # Script executed when the voice assistant is idle (waiting for a wake word)
  # Nothing (Either LED ring off or LED ring on if the user decided to turn the user facing LED ring on)
  - id: control_leds_voice_assistant_idle_phase
    then:
      - light.turn_off: voice_assistant_leds
      - if:
          condition:
            light.is_on: led_ring
          then:
            light.turn_on: led_ring

  # Script executed when the voice assistant is waiting for a command (After the wake word)
  # Slow clockwise spin of the LED ring.
  - id: control_leds_voice_assistant_waiting_for_command_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "VoD Listening"

  # Script executed when the voice assistant is listening to a command
  # Two-mic DoA beam from the XMOS firmware, limited to a front left/right arc.
  - id: control_leds_voice_assistant_listening_for_command_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "VoD Listening"

  # Script executed while the action button is held for push-to-intercom.
  # Tater orange listening animation so it reads differently from a normal touch.
  - id: control_leds_push_to_intercom_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.45f );
          red: 100%
          green: 54%
          blue: 0%
          id: voice_assistant_leds
          effect: "Listening For Command"

  # Script executed when the voice assistant is thinking to a command
  # The spin stops and the 2 LEDs that are currently on and blinking indicating the commend is being processed.
  - id: control_leds_voice_assistant_thinking_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Thinking"

  # Script executed when the voice assistant is announcing a tool call
  # Two mirrored heads bounce between opposite collision points.
  - id: control_leds_voice_assistant_tool_call_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Tool Call"


  # Script executed when the voice assistant is thinking to a command
  # Fast anticlockwise spin of the LED ring.
  - id: control_leds_voice_assistant_replying_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Replying"

  # Script executed when the voice assistant is in error
  # Fast Red Pulse
  - id: control_leds_voice_assistant_error_phase
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Error"
      - delay: 2s
      - lambda: id(volume_buttons_touched) = false;
      - script.execute: control_leds

  # Script executed when the voice assistant requires user action
  # 5 Fast Red Pulses
  - id: control_leds_warning
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Warning"
      - delay: 2s
      - lambda: id(warning) = false;
      - script.execute: control_leds

  # Script executed when the voice assistant is muted or silent
  # The LED next to the 2 microphones turn red / one red LED next to the speaker grill
  - id: control_leds_muted_or_silent
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Muted or Silent"

  # Script executed when the voice assistant is not ready
  - id: control_leds_voice_assistant_not_ready_phase
    then:
      - light.turn_on:
          brightness: 66%
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Twinkle"

  # Script executed when the volume button is touched
  # A number of LEDs turn on indicating a visual representation of the volume of the media player entity.
  - id: control_leds_volume_buttons_touched
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Volume Display"

  # Script executed when the jack has just been unplugged
  # A ripple effect
  - id: control_leds_jack_unplugged_recently
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Jack Unplugged"

  # Script executed when the jack has just been plugged
  # A ripple effect
  - id: control_leds_jack_plugged_recently
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Jack Plugged"

  # Script executed when the center button is touched
  # The complete LED ring turns on
  - id: control_leds_action_button_touched
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Action Button Touched"

  # Script executed when the timer is ringing, to control the LEDs
  # The LED ring blinks.
  - id: control_leds_timer_ringing
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Timer Ring"

  # Script executed when the timer is ticking, to control the LEDs
  # The LEDs shows the remaining time as a fraction of the full ring.
  - id: control_leds_timer_ticking
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Timer tick"

  # Script executed when the timer is ticking, to control the LEDs
  # The LEDs shows the remaining time as a fraction of the full ring.
  - id: control_leds_xmos_flasher_state_update
    then:
      - if:
          condition:
            lambda: 'return id(xmos_flashing_state) == 1;'
          then:
            - light.turn_on:
                brightness: !lambda return .6f ;
                id: voice_assistant_leds
                effect: "Flashing XMOS"
          else:
            - light.turn_on:
                brightness: !lambda return .6f ;
                id: voice_assistant_leds
                effect: !lambda 'return id(xmos_flashing_state) == 3 ? "Error" : "Success" ;'
            - delay: 1s
            - light.turn_off:
                id: voice_assistant_leds
