name: Generate Wake Manifests

on:
  workflow_dispatch:
  push:
    paths:
      - 'microWakeWords/**/*.json'
      - 'microWakeWords/**/*.tflite'
      - 'microWakeWordsV2/**/*.json'
      - 'microWakeWordsV2/**/*.tflite'
      - 'microWakeWordsV3/**/*.json'
      - 'microWakeWordsV3/**/*.tflite'
      - 'wakeSounds/**/*'
      - 'scripts/generate_wake_word_manifest.py'
      - 'scripts/generate_wake_sound_manifest.py'
      - 'scripts/normalize_wake_sounds.py'
      - '.github/workflows/generate-wake-word-manifest.yml'

permissions:
  contents: write

concurrency:
  group: wake-manifests
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install audio tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Normalize wake sounds and generate manifests
        run: |
          python3 scripts/normalize_wake_sounds.py --force
          python3 scripts/generate_wake_word_manifest.py
          python3 scripts/generate_wake_sound_manifest.py

      - name: Commit generated wake assets
        run: |
          find wakeSounds -maxdepth 1 -type f -name '*.flac' -exec git add -- {} +
          git add wake_word_manifest.json wake_sound_manifest.json
          if git diff --cached --quiet; then
            echo 'No generated wake asset changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Update generated wake assets'
          git push
