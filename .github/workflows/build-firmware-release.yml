name: Build Firmware Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Firmware version to build, for example 3.0.12
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: firmware-release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  ESPHOME_VERSION: '2026.5.1'

jobs:
  build:
    name: Compile firmware
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve firmware version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
            version="${version#v}"
          fi

          if [[ ! "${version}" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid firmware version: ${version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=v${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache ESPHome build tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .esphome
          key: esphome-${{ runner.os }}-${{ env.ESPHOME_VERSION }}-${{ hashFiles('**/*.yaml', '**/*.yml', 'shared/components/**', 'sat1/components/**', 'voicepe/components/**', 'respeaker_lite/components/**', 'respeaker_xvf3800/components/**', 'koala/components/**') }}
          restore-keys: |
            esphome-${{ runner.os }}-${{ env.ESPHOME_VERSION }}-

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          python -m pip install "esphome==${ESPHOME_VERSION}"
          esphome version

      - name: Compile all firmware
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          configs=(
            satellite1-TaterTimer.yaml
            voicePE-TaterTimer.yaml
            respeakerLite-TaterTimer.yaml
            respeakerXVF3800-TaterTimer.yaml
            koala-TaterTimer.yaml
            esp32-s3-box-3.yaml
          )

          for config in "${configs[@]}"; do
            echo "::group::Compile ${config}"
            esphome \
              -s firmware_version "${VERSION}" \
              -s esp32_fw_version "${VERSION}" \
              compile "${config}"
            echo "::endgroup::"
          done

      - name: Package prebuilt firmware
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 scripts/package_prebuilt_firmware.py \
            --version "${VERSION}" \
            --output-root dist/prebuilt_firmware \
            --release-dir dist/release

      - name: Upload packaged firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaged-firmware-${{ steps.version.outputs.version }}
          path: dist
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Download packaged firmware
        uses: actions/download-artifact@v4
        with:
          name: packaged-firmware-${{ needs.build.outputs.version }}
          path: dist

      - name: Update prebuilt firmware on default branch
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p prebuilt_firmware
          rm -rf "prebuilt_firmware/${VERSION}"
          cp -R "dist/prebuilt_firmware/${VERSION}" "prebuilt_firmware/"
          cp "dist/prebuilt_firmware/latest.json" "prebuilt_firmware/latest.json"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "prebuilt_firmware/${VERSION}" prebuilt_firmware/latest.json

          if git diff --cached --quiet; then
            echo "No prebuilt firmware changes to commit."
          else
            git commit -m "Add prebuilt firmware ${VERSION}"
            git push origin "HEAD:${{ github.event.repository.default_branch }}"
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.build.outputs.tag_name }}
          VERSION: ${{ needs.build.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          release_notes="dist/release/release-notes.md"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "Tater firmware ${VERSION}" \
              --notes-file "${release_notes}"
          else
            gh release create "${TAG_NAME}" \
              --title "Tater firmware ${VERSION}" \
              --notes-file "${release_notes}" \
              --target "${GITHUB_SHA}"
          fi

          mapfile -t assets < <(find "dist/prebuilt_firmware/${VERSION}" -type f | sort)
          assets+=("dist/prebuilt_firmware/latest.json")
          assets+=("dist/release/tater-firmware-${VERSION}-checksums.txt")
          assets+=("dist/release/tater-firmware-${VERSION}.zip")

          gh release upload "${TAG_NAME}" "${assets[@]}" --clobber
