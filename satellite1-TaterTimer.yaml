substitutions:
  # -----------------------------
  # DEVICE IDENTITY
  # -----------------------------
  friendly_name: "Tater_Sat1"
  node_name: satellite1
  company_name: Tater
  project_name: Tater_Sat1
  component_name: Core

  # -----------------------------
  # WIFI / NETWORK
  # -----------------------------
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  ha_voice_ip: "127.0.0.1"   # optional - remove if not needed
  hidden_ssid: "false"

  # -----------------------------
  # SENSOR CALIBRATION
  # -----------------------------
  temp_offset: "-3"
  humidity_offset: "5"

  # -----------------------------
  # FIRMWARE VERSIONS
  # -----------------------------
  esp32_fw_version: dev
  xmos_fw_version: "v1.0.3"

  # -----------------------------
  # WAKE WORD CONFIG
  # -----------------------------
  wake_word_name: hey_tater
  wake_word_model_url: https://raw.githubusercontent.com/TaterTotterson/microWakeWords/refs/heads/main/microWakeWords/hey_tater.json
  wake_model_stop_url: https://github.com/kahrendt/microWakeWord/releases/download/stop/stop.json

  # -----------------------------
  # WAKE WORD SENSITIVITY (probability cutoff)
  # -----------------------------
  wake_cutoff_slight: "250"     # ~0.98
  wake_cutoff_moderate: "245"   # ~0.96
  wake_cutoff_very: "222"       # ~0.87

  # -----------------------------
  # VOICE ASSISTANT PHASE IDS
  # -----------------------------
  voice_assist_idle_phase_id: '1'
  voice_assist_waiting_for_command_phase_id: '2'
  voice_assist_listening_for_command_phase_id: '3'
  voice_assist_thinking_phase_id: '4'
  voice_assist_replying_phase_id: '5'
  voice_assist_not_ready_phase_id: '10'
  voice_assist_error_phase_id: '11'

  # -----------------------------
  # AUDIO FILE URLS
  # -----------------------------
  center_button_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_press.flac
  center_button_double_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_double_press.flac
  center_button_triple_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_triple_press.flac
  center_button_long_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_long_press.flac
  factory_reset_initiated_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_initiated.mp3
  factory_reset_cancelled_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_cancelled.mp3
  mute_switch_on_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_on.flac
  mute_switch_off_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_off.flac
  timer_finished_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
  wake_word_triggered_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
  jack_connected_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/jack_connected.flac
  jack_disconnected_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/jack_disconnected.flac

globals:
  # Global initialisation variable. Initialized to true and set to false once everything is connected. Only used to have a smooth "plugging" experience
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: 'true'
  # Global variable storing if user action causes warning
  - id: warning
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking the XMOS flasher status.
  - id: xmos_flashing_state
    type: int
    restore_value: no
    initial_value: '0'

esphome:
  name: ${node_name}
  name_add_mac_suffix: true
  friendly_name: ${friendly_name}
  min_version: 2026.2.0

  project:
    name: ${company_name}.${project_name}
    version: ${esp32_fw_version}

  on_boot:
    - priority: -100
      then:
        - logger.log: "${company_name} ${project_name} ${component_name} running ESP firmware: ${esp32_fw_version} and XMOS firmware: ${xmos_fw_version}"
        # Run the script to refresh the LED status
        - script.execute: control_leds
        - delay: 1s

        # if line_out was used previously but is not available try speaker
        - lambda: |
            if( !id(line_out_sensor).state && id(dac_proxy).active_dac == 1){
              id(dac_proxy).activate_speaker();
            }

        # If after 10 minutes, the device is still initializing (It did not yet connect to Home Assistant), turn off the init_in_progress variable and run the script to refresh the LED status
        - delay: 10min
        - if:
            condition:
              lambda: return id(init_in_progress);
            then:
              - lambda: id(init_in_progress) = false;
              - script.execute: control_leds

ota:
  - platform: esphome
    id: ota_esphome

logger:
  level: DEBUG
  logs:
    sensor: WARN  # avoids logging frequent sensor updates

external_components:
  - source:
      type: git
      url: https://github.com/FutureProofHomes/Satellite1-ESPHome
      ref: staging
    components:
      - audio
      - fusb302b
      - i2s_audio
      - memory_flasher
      - micro_wake_word
      - mixer
      - pcm5122
      - resampler
      - satellite1
      - snapcast
      - speaker
      - tas2780

packages:
  dashboard_build:
    button:
      # Flashes Sat1 HAT with XMOS firmware embedded in the ESP32 firmware
      - platform: template
        id: flash_embedded
        name: "XMOS Flash Embedded FW"
        entity_category: diagnostic
        on_press:
          then:
            - memory_flasher.write_embedded_image:
  core_board:
    esphome:
      platformio_options:
        board_build.flash_mode: dio
        board_upload.maximum_size: 16777216
    
    esp32:
      board: esp32-s3-devkitc-1
      variant: ESP32S3
      flash_size: 16MB
      framework:
        type: esp-idf
    
        sdkconfig_options:
          CONFIG_ESP32_S3_BOX_BOARD: "y"
          CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
    
          CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ: "240"
    
          CONFIG_SPIRAM_RODATA: "y"
          CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
          CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY: "y"
    
          # FreeRTOS
          CONFIG_SPIRAM_ALLOW_STACK_EXTERNAL_MEMORY: "y"
    
          # LWIP
          CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
          CONFIG_LWIP_IRAM_OPTIMIZATION: "y"
          CONFIG_LWIP_TCPIP_TASK_PRIO: "18"
          CONFIG_LWIP_TCPIP_TASK_AFFINITY_CPU0: "y"
    
          CONFIG_LWIP_TCP_SND_BUF_DEFAULT: "65535"
          CONFIG_LWIP_TCP_WND_DEFAULT: "65535"
          CONFIG_LWIP_TCPIP_RECVMBOX_SIZE: "64"
          CONFIG_LWIP_TCP_RECVMBOX_SIZE: "64"
          CONFIG_LWIP_UDP_RECVMBOX_SIZE: "64"
          CONFIG_LWIP_TCP_RTO_TIME: "500"        # Default was 1500ms
          CONFIG_LWIP_TCP_SACK_OUT: "y"          # Default was disabled
          CONFIG_LWIP_TCP_OOSEQ_MAX_PBUFS: "8"   # Default was 4
    
          # WiFi
          CONFIG_ESP_WIFI_AMPDU_RX_ENABLED: "y"
          CONFIG_ESP_WIFI_RX_BA_WIN: "32"
          CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "16"
          CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM: "128"
          CONFIG_ESP_WIFI_DYNAMIC_TX_BUFFER_NUM: "64"
          CONFIG_ESP_WIFI_AMPDU_TX_ENABLED: "y"
          CONFIG_ESP_WIFI_TX_BA_WIN: "32"
    
          # BT
          CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
          CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
    
          # MDNS
          CONFIG_MDNS_MEMORY_ALLOC_SPIRAM: "y"
    
    psram:
      mode: octal
      speed: 80MHz
      ignore_not_found: false
    
    i2c:
      - id: i2c_0
        sda: GPIO5
        scl: GPIO6
        frequency: 400kHz
        scan: True
    
    spi:
      - id: spi_0
        clk_pin: GPIO12
        mosi_pin: GPIO11
        miso_pin: GPIO13
        interface: SPI2
    
    i2s_audio:
      - id: i2s_shared
        i2s_lrclk_pin: GPIO07
        i2s_bclk_pin: GPIO08
        i2s_mclk_pin: GPIO16
        access_mode: duplex
        i2s_mode: secondary
        use_legacy: false
  wifi:
    globals:
      - id: improv_ble_in_progress
        type: bool
        restore_value: no
        initial_value: 'false'
    
    wifi:
      ssid: ${wifi_ssid}
      password: ${wifi_password}
      use_address: ${ha_voice_ip}
      id: wifi_id
      fast_connect: ${hidden_ssid}
      on_connect:
        - lambda: id(improv_ble_in_progress) = false;
        - script.execute: control_leds
      on_disconnect:
        - script.execute: control_leds
    
    improv_serial:
    
  sensors:
    sensor:
      - platform: aht10
        id: "aht20_temp_hum_sensor"
        address: 0x38
        variant: AHT20
        temperature:
          name: Temperature
          id: temperature_sensor
          filters:
            - offset: ${temp_offset}
            - lambda: "return x + id(temp_offset_ui).state;"
        humidity:
          name: Humidity
          id: humidity_sensor
          filters:
            - offset: ${humidity_offset}
            - lambda: "return x + id(humidity_offset_ui).state;"
      - platform: wifi_signal
        name: "Wi-Fi Signal Strength"
        entity_category: "diagnostic"
        update_interval: 60s
    
      - platform: ltr_als_ps
        address: 0x29
        type: ALS
        update_interval: 60s
    
        # short variant of sensor definition:
        ambient_light: "Ambient Light"
    
    number:
      # Dynamically adjust the temperature and humidity offset.  Credit goes to Lewis over @ EverythingSmartHome.  I admire your work and hope to meet someday.  Beers on me.
      - platform: template
        name: "Offset Temperature"
        id: temp_offset_ui
        device_class: temperature
        min_value: -20
        max_value: 20
        step: 0.1
        mode: box
        update_interval: never
        optimistic: true
        restore_value: true
        initial_value: 0
        icon: "mdi:thermometer"
        entity_category: config
        on_value:
          - lambda: 'id(aht20_temp_hum_sensor).update();'
    
      - platform: template
        name: "Offset Humidity"
        id: humidity_offset_ui
        unit_of_measurement: "%"
        min_value: -50
        max_value: 50
        step: 0.1
        mode: box
        update_interval: never
        optimistic: true
        restore_value: true
        initial_value: 0
        icon: "mdi:water-percent"
        entity_category: config
        on_value:
          - lambda: 'id(aht20_temp_hum_sensor).update();'
  buttons:
    globals:
      # Global variable tracking if the volume button was recently touched.
      - id: volume_buttons_touched
        type: bool
        restore_value: no
        initial_value: 'false'
    
      # Global variable tracking if the action button was recently touched.
      - id: action_button_touched
        type: bool
        restore_value: no
        initial_value: 'false'
    
      - id: factory_reset_requested
        type: bool
        restore_value: no
        initial_value: 'false'
    
    event:
      # Event entity exposed to the user to automate on complex action button presses.
      # The simple press is not exposed as it is used to control the device itself.
      - platform: template
        id: action_button_press_event
        name: "Action Button Press"
        icon: mdi:button-pointer
        device_class: button
        event_types:
          - single_press
          - double_press
          - triple_press
          - long_press
    
    binary_sensor:
      - platform: gpio
        id: btn_up
        pin:
          satellite1:
          port: INPUT_A
          pin: 0
          inverted: true
        name: "Button Up (Vol+)"
        icon: "mdi:volume-plus"
        on_press:
          then:
            - lambda: id(volume_buttons_touched) = true;
            - script.execute:
                id: control_volume
                increase_volume: true
    
      - platform: gpio
        id: btn_down
        pin:
          satellite1:
          port: INPUT_A
          pin: 2
          inverted: true
        name: "Button Down (Vol-)"
        icon: "mdi:volume-minus"
        on_press:
          then:
            - lambda: id(volume_buttons_touched) = true;
            - script.execute:
                id: control_volume
                increase_volume: false
    
      - platform: gpio
        id: btn_left
        pin:
          satellite1:
          port: INPUT_A
          pin: 3
          inverted: false
        name: "Button Left (HW Mute)"
        icon: "mdi:microphone-off"
        on_state:
          - if:
              condition:
                binary_sensor.is_off: btn_left
              then:
                - script.execute:
                    id: play_sound
                    priority: false
                    sound_file: !lambda return id(mute_switch_off_sound);
                - switch.template.publish:
                    id: master_mute_switch
                    state: OFF
              else:
                - script.execute:
                    id: play_sound
                    priority: false
                    sound_file: !lambda return id(mute_switch_on_sound);
                - switch.template.publish:
                    id: master_mute_switch
                    state: ON
    
      - platform: gpio
        id: btn_action
        pin:
          number: 0
          inverted: true
          mode:
            input: true
            pullup: true
          ignore_strapping_warning: true
        name: "Button Right (Action)"
        icon: "mdi:gesture-tap"
        on_press:
          - script.execute: control_leds
        on_release:
          - script.execute: control_leds
        on_multi_click:
          # Simple Click:
          #   - Abort "things" in order
          #     - Timer
          #     - Announcements
          #     - Voice Assistant Pipeline run
          #     - Music
          #   - Starts the voice assistant if it is not yet running and if the device is not muted.
          - timing:
              - ON for at most 1s
              - OFF for at least 0.25s
            then:
              - if:
                  condition:
                    lambda: return !id(init_in_progress);
                  then:
                    - event.trigger:
                        id: action_button_press_event
                        event_type: "single_press"
                    - if:
                        condition:
                          switch.is_on: timer_ringing
                        then:
                          - switch.turn_off: timer_ringing
                        else:
                          - if:
                              condition:
                                voice_assistant.is_running:
                              then:
                                - voice_assistant.stop:
                              else:
                                - if:
                                    condition:
                                      media_player.is_announcing:
                                    then:
                                      media_player.stop:
                                        announcement: true
                                    else:
                                      - if:
                                          condition:
                                            media_player.is_playing:
                                          then:
                                            - media_player.pause:
                                          else:
                                            - if:
                                                condition:
                                                  and:
                                                    - switch.is_off: master_mute_switch
                                                    - not:
                                                        voice_assistant.is_running
                                                then:
                                                  - script.execute:
                                                      id: play_sound
                                                      priority: true
                                                      sound_file: !lambda return id(center_button_press_sound);
                                                  - delay: 300ms
                                                  - voice_assistant.start:
          # Double Click
          #  . Exposed as an event entity. To be used in automations inside Home Assistant
          - timing:
              - ON for at most 1s
              - OFF for at most 0.25s
              - ON for at most 1s
              - OFF for at least 0.25s
            then:
              - if:
                  condition:
                    lambda: return !id(init_in_progress);
                  then:
                    - script.execute:
                        id: play_sound
                        priority: false
                        sound_file: !lambda return id(center_button_double_press_sound);
                    - event.trigger:
                        id: action_button_press_event
                        event_type: "double_press"
          # Triple Click
          #  . Exposed as an event entity. To be used in automations inside Home Assistant
          - timing:
              - ON for at most 1s
              - OFF for at most 0.25s
              - ON for at most 1s
              - OFF for at most 0.25s
              - ON for at most 1s
              - OFF for at least 0.25s
            then:
              - if:
                  condition:
                    lambda: return !id(init_in_progress);
                  then:
                    - script.execute:
                        id: play_sound
                        priority: false
                        sound_file: !lambda return id(center_button_triple_press_sound);
                    - event.trigger:
                        id: action_button_press_event
                        event_type: "triple_press"
          # Long Press
          #  . Exposed as an event entity. To be used in automations inside Home Assistant
          - timing:
              - ON for at least 1s
            then:
              - if:
                  condition:
                    lambda: return !id(init_in_progress);
                  then:
                    - script.execute:
                        id: play_sound
                        priority: false
                        sound_file: !lambda return id(center_button_long_press_sound);
                    - light.turn_off: voice_assistant_leds
                    - event.trigger:
                        id: action_button_press_event
                        event_type: "long_press"
    
          # Factory Reset Warning
          #  . Audible and Visible warning.
          - timing:
              - ON for at least 10s
            then:
              - if:
                  condition:
                    lambda: return !id(action_button_touched);
                  then:
                    - light.turn_on:
                        brightness: 100%
                        id: voice_assistant_leds
                        effect: "Factory Reset Coming Up"
                    - script.execute:
                        id: play_sound
                        priority: true
                        sound_file: !lambda return id(factory_reset_initiated_sound);
                    - wait_until:
                        binary_sensor.is_off: btn_action
                    - light.turn_off: voice_assistant_leds
                    - script.execute:
                        id: play_sound
                        priority: true
                        sound_file: !lambda return id(factory_reset_cancelled_sound);
    
          # Factory Reset
          - timing:
              - ON for at least 22s
            then:
              - if:
                  condition:
                    lambda: return !id(action_button_touched);
                  then:
                    - if:
                        condition:
                          - lambda: return id(xflash).flash_accessible();
                        then:
                          - lambda: id(factory_reset_requested) = true;
                          - memory_flasher.erase:
                        else:
                          - button.press: factory_reset_button
  ha:
    api:
      id: api_id
      on_client_connected:
        - lambda: id(init_in_progress) = false;
        - script.execute: control_leds
      on_client_disconnected:
        - script.execute: control_leds
      encryption:   # Uses key set by Home Assistant
    
    button:
      # Restarts Sat1 Device
      - platform: restart
        name: "Restart Sat1"
        entity_category: diagnostic
    
      # Restores the Sat1 ESP back to factory settings
      - platform: factory_reset
        id: factory_reset_button
        name: "Factory Reset ESP32 FW"
        entity_category: diagnostic
        internal: true
    
    switch:
      # Wake Word Sound Switch.
      - platform: template
        id: wake_sound
        name: Wake sound
        icon: "mdi:bullhorn"
        entity_category: config
        optimistic: true
        restore_mode: RESTORE_DEFAULT_ON
    
        # This is the master mute switch. It is exposed to Home Assistant. The user can only turn it on and off if the hardware switch is off. (The hardware switch overrides the software one)
      - platform: template
        id: master_mute_switch
        restore_mode: RESTORE_DEFAULT_OFF
        icon: "mdi:microphone-off"
        name: Mute Microphones
        entity_category: config
        turn_on_action:
          - if:
              condition:
                binary_sensor.is_off: btn_left
              then:
                - switch.template.publish:
                    id: master_mute_switch
                    state: ON
        turn_off_action:
          - if:
              condition:
                binary_sensor.is_off: btn_left
              then:
                - switch.template.publish:
                    id: master_mute_switch
                    state: OFF
              else:
                - lambda: id(warning) = true;
                - script.execute: control_leds
        on_turn_on:
          - script.execute: control_leds
        on_turn_off:
          - script.execute: control_leds
    
    text_sensor:
      - platform: template
        id: pd_state_text
        name: "USB-C Power Supply"
        icon: "mdi:usb-c-port"
        entity_category: "diagnostic"
        update_interval: never
        lambda: |-
          if( id(pd_fusb302b).state == power_delivery::PD_STATE_DISCONNECTED){
            return std::string("Detached");
          } else {
            return id(pd_fusb302b).contract;
          }
    
      - platform: template
        id: xmos_firmware_version_text
        name: "XMOS Firmware"
        icon: "mdi:memory"
        entity_category: "diagnostic"
        update_interval: never
        lambda: return id(satellite1_id).status_string();
  mp:
    audio_dac:
      - platform: pcm5122
        id: line_out_dac
        address: 0x4D
      - platform: tas2780
        id: speaker_dac
        address: 0x3F
      - platform: satellite1
        id: dac_proxy
        speaker_dac: speaker_dac
        line_out_dac: line_out_dac
    
        on_state_change:
          - media_player.speaker.restore_volume:
              volume: !lambda return id(dac_proxy).volume();
              mute: !lambda return id(dac_proxy).is_muted();
    
    api:
      actions:
        - action: activate_speaker_dac
          then:
            - dac_proxy.activate_speaker:
    
        - action: activate_lineout_dac
          then:
            - dac_proxy.activate_line_out:
    
    select:
      - platform: template
        name: Speaker channel output
        id: tas_mode_select
        icon: "mdi:speaker-multiple"
        options:
          - "Mono (Left + Right)"
          - "Left Channel Only"
          - "Right Channel Only"
        initial_option: "Mono (Left + Right)"
        entity_category: config
        optimistic: true
        restore_value: true
        on_value:
          - tas2780.update_config:
              channel: !lambda |-
                auto index = id(tas_mode_select).active_index();
                if (index.has_value()){
                  return index.value();
                }
                ESP_LOGI("main", "No channel selected");
                return 0;
    
    binary_sensor:
      - platform: gpio
        id: line_out_sensor
        pin:
          pcm5122:
          pin: 4
          inverted: false
        name: "Line-Out Connected"
        icon: "mdi:audio-input-stereo-minijack"
        filters:
          - delayed_on: 200ms
          - delayed_off: 200ms
    
        on_press:
          - dac_proxy.activate_line_out:
          - lambda: id(jack_plugged_recently) = true;
          - script.execute: control_leds
          - delay: 200ms
          - script.execute:
              id: play_sound
              priority: false
              sound_file: !lambda return id(jack_connected_sound);
          - delay: 800ms
          - lambda: id(jack_plugged_recently) = false;
          - script.execute: control_leds
    
        on_release:
          - dac_proxy.activate_speaker:
          - lambda: id(jack_unplugged_recently) = true;
          - script.execute: control_leds
          - delay: 200ms
          - script.execute:
              id: play_sound
              priority: false
              sound_file: !lambda return id(jack_disconnected_sound);
          - delay: 800ms
          - lambda: id(jack_unplugged_recently) = false;
          - script.execute: control_leds
    
    switch:
      # Wake Word Sound Switch.
      - platform: template
        id: snapcast_switch
        name: Snapcast
        icon: "mdi:cast-audio"
        entity_category: config
        optimistic: true
        restore_mode: RESTORE_DEFAULT_ON
        on_turn_on:
          then:
            - snapcast.enable:
        on_turn_off:
          then:
            - snapcast.disable:
    
    fusb302b:
      id: pd_fusb302b
      irq_pin: GPIO1
      request_voltage: 20
      on_power_ready:
        then:
          - logger.log:
              format: "PD contract got accepted: %s"
              args: ['id(pd_fusb302b).contract.c_str()']
    
          - text_sensor.template.publish:
              id: pd_state_text
              state: !lambda 'return id(pd_fusb302b).contract;'
          - if:
              condition:
                lambda: |-
                  return id(pd_fusb302b).contract_voltage >= 9;
              then:
                - tas2780.activate:
                    mode: 2
              else:
                - tas2780.activate:
                    mode: 0
    speaker:
      - platform: i2s_audio
        id: i2s_audio_speaker
        sample_rate: 48000
        i2s_dout_pin: GPIO9
        bits_per_sample: 32bit
        i2s_audio_id: i2s_shared
        dac_type: external
        channel: stereo
        timeout: never
        audio_dac: dac_proxy
        # buffer_duration: 100ms
    
      # Virtual speakers to combine the announcement and media streams together into one output
      - platform: mixer
        id: mixing_speaker
        output_speaker: i2s_audio_speaker
        num_channels: 2
        source_speakers:
          - id: announcement_mixing_input
            timeout: never
          - id: media_mixing_input
            timeout: never
            buffer_duration: 100ms
    
      # Vritual speakers to resample each pipelines' audio, if necessary, as the mixer speaker requires the same sample rate
      - platform: resampler
        id: announcement_resampling_speaker
        output_speaker: announcement_mixing_input
        sample_rate: 48000
        bits_per_sample: 16
      - platform: resampler
        id: media_resampling_speaker
        output_speaker: media_mixing_input
        sample_rate: 48000
        bits_per_sample: 16
    
    snapcast:
      id: snapcast_client
    
    media_player:
      - platform: speaker
        id: external_media_player
        name: Sat1 Media Player
        internal: false
        volume_increment: 0.05
        volume_min: 0.1
        volume_max: 1.
        snapcast: snapcast_client
        announcement_pipeline:
          speaker: announcement_resampling_speaker
          format: FLAC     # FLAC is the least processor intensive codec
          num_channels: 1  # Stereo audio is unnecessary for announcements
          sample_rate: 48000
        media_pipeline:
          speaker: media_resampling_speaker
          format: FLAC     # FLAC is the least processor intensive codec
          num_channels: 2
          sample_rate: 48000
    
        on_mute:
          - script.execute: control_leds
        on_unmute:
          - script.execute: control_leds
        on_volume:
          - script.execute: control_leds
    
        on_announcement:
          - mixer_speaker.apply_ducking:
              id: media_mixing_input
              decibel_reduction: 20
              duration: 0.0s
    
        on_state:
          if:
            condition:
              and:
                - switch.is_off: timer_ringing
                - not:
                    voice_assistant.is_running:
                - not:
                    media_player.is_announcing:
            then:
              - mixer_speaker.apply_ducking:
                  id: media_mixing_input
                  decibel_reduction: 0
                  duration: 1.0s
    
        files:
          - id: center_button_press_sound
            file: ${center_button_press_sound_file}
          - id: center_button_double_press_sound
            file: ${center_button_double_press_sound_file}
          - id: center_button_triple_press_sound
            file: ${center_button_triple_press_sound_file}
          - id: center_button_long_press_sound
            file: ${center_button_long_press_sound_file}
          - id: factory_reset_initiated_sound
            file: ${factory_reset_initiated_sound_file}
          - id: factory_reset_cancelled_sound
            file: ${factory_reset_cancelled_sound_file}
          - id: mute_switch_on_sound
            file: ${mute_switch_on_sound_file}
          - id: mute_switch_off_sound
            file: ${mute_switch_off_sound_file}
          - id: timer_finished_sound
            file: ${timer_finished_sound_file}
          - id: wake_word_triggered_sound
            file: ${wake_word_triggered_sound_file}
          - id: jack_connected_sound
            file: ${jack_connected_sound_file}
          - id: jack_disconnected_sound
            file: ${jack_disconnected_sound_file}
    
    script:
      # Script executed when we want to play sounds on the device.
      - id: play_sound
        parameters:
          priority: bool
          sound_file: "audio::AudioFile*"
        then:
          - lambda: |-
              if (priority) {
                id(external_media_player)
                  ->make_call()
                  .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_STOP)
                  .set_announcement(true)
                  .perform();
              }
              if ( (id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING ) || priority) {
                id(external_media_player)
                  ->play_file(sound_file, true, false);
              }
    
      # Script to increased/decreased volume
      - id: control_volume
        mode: restart
        parameters:
          increase_volume: bool  # True: Increase volume / False: Decrease volume.
        then:
          - delay: 16ms
          - if:
              condition:
                lambda: return increase_volume;
              then:
                - media_player.volume_up:
              else:
                - media_player.volume_down:
          - script.execute: control_leds
          - delay: 2s
          - lambda: id(volume_buttons_touched) = false;
          - script.execute: control_leds
  va:
    globals:
      # Global variable tracking the phase of the voice assistant (defined above). Initialized to not_ready
      - id: voice_assistant_phase
        type: int
        restore_value: no
        # initial_value: ${voice_assist_not_ready_phase_id}
    
    microphone:
      - platform: satellite1
        id: sat1_mics
        sample_rate: 48000
        i2s_din_pin: GPIO15
        bits_per_sample: 32bit
        channel: stereo
        pdm: false
        adc_type: external
        i2s_audio_id: i2s_shared
    
    micro_wake_word:
      id: mww
      models:
        - model: ${wake_word_model_url}
          id: ${wake_word_name}
        - model: ${wake_model_stop_url}
          id: stop
          internal: true
      microphone:
        microphone: sat1_mics
        channels: 1
        gain_factor: 4
      stop_after_detection: false
      on_wake_word_detected:
        # If the wake word is detected when the device is muted (Possible with the software mute switch): Do nothing
        - if:
            condition:
              switch.is_off: master_mute_switch
            then:
              # If a timer is ringing: Stop it, do not start the voice assistant (We can stop timer from voice!)
              - if:
                  condition:
                    switch.is_on: timer_ringing
                  then:
                    - switch.turn_off: timer_ringing
                  # Stop voice assistant if running
                  else:
                    - if:
                        condition:
                          voice_assistant.is_running:
                        then:
                          voice_assistant.stop:
                        # Stop any other media player announcement
                        else:
                          - if:
                              condition:
                                media_player.is_announcing:
                              then:
                                - media_player.stop:
                                    announcement: true
                              # Start the voice assistant and play the wake sound, if enabled
                              else:
                                - if:
                                    condition:
                                      switch.is_on: wake_sound
                                    then:
                                      - script.execute:
                                          id: play_sound
                                          priority: true
                                          sound_file: !lambda return id(wake_word_triggered_sound);
                                      - delay: 300ms
                                - voice_assistant.start:
                                    wake_word: !lambda return wake_word;
    
    voice_assistant:
      id: va
      microphone:
        microphone: sat1_mics
        channels: 0
    
      media_player: external_media_player
      micro_wake_word: mww
      use_wake_word: false
      noise_suppression_level: 0
      auto_gain: 0 dbfs
      volume_multiplier: 1
      on_client_connected:
        - lambda: id(init_in_progress) = false;
        - micro_wake_word.start:
        - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
        - script.execute: control_leds
      on_client_disconnected:
        - voice_assistant.stop:
        - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
        - script.execute: control_leds
      on_error:
        - if:
            condition:
              and:
                - lambda: return !id(init_in_progress);
                - lambda: return code != "duplicate_wake_up_detected";
            then:
              - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
              - script.execute: control_leds
        # Stop ducking audio.
        - mixer_speaker.apply_ducking:
            id: media_mixing_input
            decibel_reduction: 0   # 0 dB means no reduction
            duration: 1.0s
    
      # When the voice assistant starts: Play a wake up sound, duck audio.
      on_start:
        - mixer_speaker.apply_ducking:
            id: media_mixing_input
            decibel_reduction: 20   # Number of dB quieter; higher implies more quiet, 0 implies full volume
            duration: 0.0s          # The duration of the transition (default is 0)
      on_listening:
        - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
        - script.execute: control_leds
      on_stt_vad_start:
        - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
        - script.execute: control_leds
      on_stt_vad_end:
        - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
        - script.execute: control_leds
      on_intent_progress:
        - if:
            condition:
              # A nonempty x variable means a streaming TTS url was sent to the media player
              lambda: 'return !x.empty();'
            then:
              - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
              - script.execute: control_leds
              # Start a script that would potentially enable the stop word if the response is longer than a second
              - script.execute: activate_stop_word_once
      on_tts_start:
        - if:
            condition:
              # The intent_progress trigger didn't start the TTS Reponse
              lambda: 'return id(voice_assistant_phase) != ${voice_assist_replying_phase_id};'
            then:
              - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
              - script.execute: control_leds
              # Start a script that would potentially enable the stop word if the response is longer than a second
              - script.execute: activate_stop_word_once
      # When the voice assistant ends ...
      on_end:
        - wait_until:
            not:
              voice_assistant.is_running:
        # Stop ducking audio.
        - mixer_speaker.apply_ducking:
            id: media_mixing_input
            decibel_reduction: 0   # 0 dB means no reduction
            duration: 1.0s
        # Stop the script that would potentially enable the stop word if the response is longer than a second
        - script.stop: activate_stop_word_if_tts_step_is_long
        # Disable the stop word (If the tiemr is not ringing)
        - if:
            condition:
              switch.is_off: timer_ringing
            then:
        # - lambda: id(stop).disable();
        # If the end happened because of an error, let the error phase on for a second
        - if:
            condition:
              lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
            then:
              - delay: 1s
        # Reset the voice assistant phase id and reset the LED animations.
        - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
        - script.execute: control_leds
    
      on_timer_finished:
        - switch.turn_on: timer_ringing
      on_timer_started:
        - script.execute: control_leds
      on_timer_cancelled:
        - script.execute: control_leds
      on_timer_updated:
        - script.execute: control_leds
      on_timer_tick:
        - script.execute: control_leds
    
    script:
      # Script used activate the stop word if the TTS step is long.
      # Why is this wrapped on a script?
      #   Becasue we want to stop the sequence if the TTS step is faster than that.
      #   This allows us to prevent having the deactivation of the stop word before its own activation.
      - id: activate_stop_word_if_tts_step_is_long
        then:
          - delay: 1s
          # Enable stop wake word
          # - lambda: id(stop).enable();
    
      - id: activate_stop_word_once
        then:
          - delay: 1s
          # Enable stop wake word
          - if:
              condition:
                switch.is_off: timer_ringing
              then:
                - micro_wake_word.enable_model: stop
                - wait_until:
                    not:
                      media_player.is_announcing:
                - if:
                    condition:
                      switch.is_off: timer_ringing
                    then:
                      - micro_wake_word.disable_model: stop
    
    select:
      - platform: template
        id: wake_word_sensitivity
        name: "Wake word sensitivity"
        optimistic: true
        initial_option: Slightly sensitive
        restore_value: true
        entity_category: config
        options:
          - Slightly sensitive
          - Moderately sensitive
          - Very sensitive
        on_value:
          # Sets specific wake word probabilities computed for each particular model
          # Note probability cutoffs are set as a quantized uint8 value, each comment has the corresponding floating point cutoff
          lambda: |-
            if (x == "Slightly sensitive") {
              id(${wake_word_name}).set_probability_cutoff(${wake_cutoff_slight});
            } else if (x == "Moderately sensitive") {
              id(${wake_word_name}).set_probability_cutoff(${wake_cutoff_moderate});
            } else if (x == "Very sensitive") {
              id(${wake_word_name}).set_probability_cutoff(${wake_cutoff_very});
            }
  timer:
    globals:
      # Global variable storing the first active timer
      - id: first_active_timer
        type: voice_assistant::Timer
        restore_value: false
      # Global variable storing if a timer is active
      - id: is_timer_active
        type: bool
        restore_value: false
      # Remote (device-local) timer total duration in seconds.
      - id: remote_timer_total_seconds
        type: int
        restore_value: yes
        initial_value: "0"
      # Remote (device-local) timer remaining duration in seconds.
      - id: remote_timer_remaining_seconds
        type: int
        restore_value: yes
        initial_value: "0"
      # Tracks whether the remote timer is currently running.
      - id: remote_timer_running
        type: bool
        restore_value: yes
        initial_value: "false"

    interval:
      - interval: 1s
        then:
          - if:
              condition:
                lambda: return id(remote_timer_running);
              then:
                - lambda: |-
                    if (id(remote_timer_remaining_seconds) > 0) {
                      id(remote_timer_remaining_seconds) -= 1;
                    }
                - script.execute: control_leds
                - if:
                    condition:
                      lambda: return id(remote_timer_running) && (id(remote_timer_remaining_seconds) <= 0);
                    then:
                      - lambda: |-
                          id(remote_timer_running) = false;
                      - switch.turn_on: timer_ringing
                      - script.execute: control_leds

    number:
      - platform: template
        id: remote_timer_seconds
        name: "Remote Timer Seconds"
        icon: mdi:timer
        min_value: 0
        max_value: 7200
        step: 1
        optimistic: true
        restore_value: true
        set_action:
          - lambda: |-
              int v = (int) x;
              if (v < 0) v = 0;
              id(remote_timer_total_seconds) = v;
              id(remote_timer_remaining_seconds) = v;
              id(control_leds).execute();

    binary_sensor:
      - platform: template
        id: remote_timer_running_sensor
        name: "Remote Timer Running"
        device_class: running
        lambda: |-
          return id(remote_timer_running);

    sensor:
      - platform: template
        id: remote_timer_remaining_seconds_sensor
        name: "Remote Timer Remaining Seconds"
        icon: mdi:timer-sand
        unit_of_measurement: s
        accuracy_decimals: 0
        update_interval: 1s
        lambda: |-
          return id(remote_timer_remaining_seconds);

    button:
      - platform: template
        id: remote_timer_start
        name: "Remote Timer Start"
        icon: mdi:play
        on_press:
          - lambda: |-
              id(remote_timer_remaining_seconds) = id(remote_timer_total_seconds);
              id(remote_timer_running) = (id(remote_timer_remaining_seconds) > 0);
          - switch.turn_off: timer_ringing
          - script.execute: control_leds

      - platform: template
        id: remote_timer_cancel
        name: "Remote Timer Cancel"
        icon: mdi:stop
        on_press:
          - lambda: |-
              id(remote_timer_running) = false;
              id(remote_timer_total_seconds) = 0;
              id(remote_timer_remaining_seconds) = 0;
          - switch.turn_off: timer_ringing
          - script.execute: control_leds
    
    switch:
      # Internal switch to track when a timer is ringing on the device.
      - platform: template
        id: timer_ringing
        optimistic: true
        internal: true
        restore_mode: ALWAYS_OFF
        on_turn_off:
          # Disable stop wake word
          - micro_wake_word.disable_model: stop
          - script.execute: disable_repeat
          # Stop any current annoucement (ie: stop the timer ring mid playback)
          - if:
              condition:
                media_player.is_announcing:
              then:
                media_player.stop:
                  announcement: true
          # Set back ducking ratio to zero
          - mixer_speaker.apply_ducking:
              id: media_mixing_input
              decibel_reduction: 0
              duration: 1.0s
          # Refresh the LED ring
          - script.execute: control_leds
        on_turn_on:
          # Duck audio
          - mixer_speaker.apply_ducking:
              id: media_mixing_input
              decibel_reduction: 20
              duration: 0.0s
          # Enable stop wake word
          - micro_wake_word.enable_model: stop
          # Ring timer
          - script.execute: ring_timer
          # Refresh LED
          - script.execute: control_leds
          # If 15 minutes have passed and the timer is still ringing, stop it.
          - delay: 15min
          - switch.turn_off: timer_ringing
    
    script:
      # Script executed when the timer is ringing, to playback sounds.
      - id: ring_timer
        then:
          - script.execute: enable_repeat_one
          - script.execute:
              id: play_sound
              priority: true
              sound_file: !lambda return id(timer_finished_sound);
    
      # Script executed when the timer is ringing, to repeat the timer finished sound.
      - id: enable_repeat_one
        then:
          # Turn on the repeat mode and pause for 500 ms between playlist items/repeats
          - lambda: |-
                id(external_media_player)
                  ->make_call()
                  .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
                  .set_announcement(true)
                  .perform();
                id(external_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 500);
    
      # Script execute when the timer is done ringing, to disable repeat mode.
      - id: disable_repeat
        then:
          # Turn off the repeat mode and pause for 0 ms between playlist items/repeats
          - lambda: |-
                id(external_media_player)
                  ->make_call()
                  .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
                  .set_announcement(true)
                  .perform();
                id(external_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
    
      # Script used to fetch the first active timer (Stored in global first_active_timer)
      - id: fetch_first_active_timer
        then:
          - lambda: |
              const auto timers = id(va).get_timers();
              auto output_timer = *timers.begin();
              for (const auto &timer : timers) {
                if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
                  output_timer = timer;
                }
              }
              id(first_active_timer) = output_timer;
    
      # Script used to check if a timer is active (Stored in global is_timer_active)
      - id: check_if_timers_active
        then:
          - lambda: |
              const auto timers = id(va).get_timers();
              bool output = false;
              for (const auto &timer : timers) {
                if (timer.is_active) {
                  output = true;
                }
              }
              id(is_timer_active) = output;
  led_ring:
    globals:
      # Global index for our LEDs. So that switching between different animation does not lead to unwanted effects.
      - id: global_led_animation_index
        type: int
        restore_value: no
        initial_value: '0'
      # Global variable tracking if the jack has been plugged touched.
      - id: jack_plugged_recently
        type: bool
        restore_value: no
        initial_value: 'false'
      # Global variable tracking if the jack has been unplugged touched.
      - id: jack_unplugged_recently
        type: bool
        restore_value: no
        initial_value: 'false'
    
    light:
      # Hardware LED ring. Not used because remapping needed
      - platform: esp32_rmt_led_strip
        id: hw_led_ring
        pin: GPIO21
        num_leds: 24
        rgb_order: GRB
        chipset: WS2812
    
      # User facing LED ring. Remapping of the hardware LEDs.
      # Exposed to be used by the user.
      - platform: partition
        id: led_ring
        name: LED Ring
        entity_category: config
        icon: "mdi:dots-circle"
        default_transition_length: 0ms
        restore_mode: RESTORE_DEFAULT_OFF
        initial_state:
          color_mode: rgb
          brightness: 66%
          red: 9.4%
          green: 73.3%
          blue: 94.9%
        segments:
          - id: hw_led_ring
            from: 0
            to: 23
    
      # Voice Assistant LED ring. Remapping of the hardware LED.
      # This light is not exposed. The device controls it
      - platform: partition
        id: voice_assistant_leds
        internal: true
        default_transition_length: 0ms
        segments:
          - id: hw_led_ring
            from: 0
            to: 23
        effects:
          - addressable_lambda:
              name: "Waiting for Command"
              update_interval: 100ms
              lambda: |-
                auto light_color = id(led_ring).current_values;
                Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                      light_color.get_blue() * 255);
                for (int i = 0; i < 24; i++) {
                  if (i == id(global_led_animation_index) % 24) {
                    it[i] = color;
                  } else if (i == (id(global_led_animation_index) + 23) % 24) {
                    it[i] = color * 192;
                  } else if (i == (id(global_led_animation_index) + 22) % 24) {
                    it[i] = color * 128;
                  } else if (i == (id(global_led_animation_index) + 12) % 24) {
                    it[i] = color;
                  } else if (i == (id(global_led_animation_index) + 11) % 24) {
                    it[i] = color * 192;
                  } else if (i == (id(global_led_animation_index) + 10) % 24) {
                    it[i] = color * 128;
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
                id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 24;
          - addressable_lambda:
              name: "Listening For Command"
              update_interval: 50ms
              lambda: |-
                auto light_color = id(led_ring).current_values;
                Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                      light_color.get_blue() * 255);
                for (int i = 0; i < 24; i++) {
                  if (i == id(global_led_animation_index) % 24) {
                    it[i] = color;
                  } else if (i == (id(global_led_animation_index) + 23) % 24) {
                    it[i] = color * 192;
                  } else if (i == (id(global_led_animation_index) + 22) % 24) {
                    it[i] = color * 128;
                  } else if (i == (id(global_led_animation_index) + 12) % 24) {
                    it[i] = color;
                  } else if (i == (id(global_led_animation_index) + 11) % 24) {
                    it[i] = color * 192;
                  } else if (i == (id(global_led_animation_index) + 10) % 24) {
                    it[i] = color * 128;
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
                id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 24;
          - addressable_lambda:
              name: "Thinking"
              update_interval: 10ms
              lambda: |-
                static uint8_t brightness_step = 0;
                static bool brightness_decreasing = true;
                static uint8_t brightness_step_number = 10;
                if (initial_run) {
                  brightness_step = 0;
                  brightness_decreasing = true;
                }
                auto light_color = id(led_ring).current_values;
                Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                      light_color.get_blue() * 255);
                for (int i = 0; i < 24; i++) {
                  if (i == id(global_led_animation_index) % 24) {
                    it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
                  } else if (i == (id(global_led_animation_index) + 12) % 24) {
                    it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
                if (brightness_decreasing) {
                  brightness_step++;
                } else {
                  brightness_step--;
                }
                if (brightness_step == 0 || brightness_step == brightness_step_number) {
                  brightness_decreasing = !brightness_decreasing;
                }
          - addressable_lambda:
              name: "Replying"
              update_interval: 50ms
              lambda: |-
                id(global_led_animation_index) = (24 + id(global_led_animation_index) - 1) % 24;
                auto light_color = id(led_ring).current_values;
                Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                      light_color.get_blue() * 255);
                for (int i = 0; i < 24; i++) {
                  if (i == (id(global_led_animation_index)) % 24) {
                    it[i] = color;
                  } else if (i == ( id(global_led_animation_index) + 1) % 24) {
                    it[i] = color * 192;
                  } else if (i == ( id(global_led_animation_index) + 2) % 24) {
                    it[i] = color * 128;
                  } else if (i == ( id(global_led_animation_index) + 12) % 24) {
                    it[i] = color;
                  } else if (i == ( id(global_led_animation_index) + 13) % 24) {
                    it[i] = color * 192;
                  } else if (i == ( id(global_led_animation_index) + 14) % 24) {
                    it[i] = color * 128;
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
          - addressable_lambda:
              name: "Muted or Silent"
              update_interval: 16ms
              lambda: |-
                static int8_t index = 0;
                Color muted_color(255, 0, 0);
                auto light_color = id(led_ring).current_values;
                Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                      light_color.get_blue() * 255);
                for (int i = 0; i < 24; i++) {
                  if ( light_color.get_state() ) {
                    it[i] = color;
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
                if ( id(master_mute_switch).state ) {
                  it[23] = Color::BLACK;
                  it[0] = muted_color;
                  it[1] = Color::BLACK;
                  it[5] = Color::BLACK;
                  it[6] = muted_color;
                  it[7] = Color::BLACK;
                  it[11] = Color::BLACK;
                  it[12] = muted_color;
                  it[13] = Color::BLACK;
                  it[17] = Color::BLACK;
                  it[18] = muted_color;
                  it[19] = Color::BLACK;
                }
                if ( id(external_media_player).volume == 0.0f || id(external_media_player).is_muted() ) {
                  it[1] = Color::BLACK;
                  it[2] = muted_color;
                  it[3] = muted_color;
                  it[4] = muted_color;
                  it[5] = Color::BLACK;
                  it[7] = Color::BLACK;
                  it[8] = muted_color;
                  it[9] = muted_color;
                  it[10] = muted_color;
                  it[11] = Color::BLACK;
                  it[13] = Color::BLACK;
                  it[14] = muted_color;
                  it[15] = muted_color;
                  it[16] = muted_color;
                  it[17] = Color::BLACK;
                  it[19] = Color::BLACK;
                  it[20] = muted_color;
                  it[21] = muted_color;
                  it[22] = muted_color;
                  it[23] = Color::BLACK;
                }
          - addressable_lambda:
              name: "Volume Display"
              update_interval: 50ms
              lambda: |-
                auto light_color = id(led_ring).current_values;
                Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                      light_color.get_blue() * 255);
                Color silenced_color(255, 0, 0);
                auto volume_ratio = 24.0f * id(external_media_player).volume;
                for (int i = 0; i < 24; i++) {
                  if (i <= volume_ratio) {
                    it[(0+i)%24] = color * min( 255.0f * (volume_ratio - i) , 255.0f ) ;
                  } else {
                    it[(0+i)%24] = Color::BLACK;
                  }
                }
                if (id(external_media_player).volume == 0.0f) {
                  it[0] = silenced_color;
                }
          - addressable_lambda:
              name: "Action Button Touched"
              update_interval: 16ms
              lambda: |-
                if (initial_run) {
                  // set voice_assistant_leds light to colors based on led_ring
                  auto led_ring_cv = id(led_ring).current_values;
                  auto va_leds_call = id(voice_assistant_leds).make_call();
                  va_leds_call.from_light_color_values(led_ring_cv);
                  va_leds_call.set_brightness( min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f ) );
                  va_leds_call.set_state(true);
                  va_leds_call.perform();
                }
                auto light_color = id(voice_assistant_leds).current_values;
                Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                      light_color.get_blue() * 255);
                for (int i = 0; i < 24; i++) {
                  it[i] = color;
                }
          - addressable_twinkle:
              name: "Twinkle"
              twinkle_probability: 50%
          - addressable_lambda:
              name: "Error"
              update_interval: 10ms
              lambda: |-
                static uint8_t brightness_step = 0;
                static bool brightness_decreasing = true;
                static uint8_t brightness_step_number = 10;
                if (initial_run) {
                  brightness_step = 0;
                  brightness_decreasing = true;
                }
                Color error_color(255, 0, 0);
                for (int i = 0; i < 24; i++) {
                  it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
                }
                if (brightness_decreasing) {
                  brightness_step++;
                } else {
                  brightness_step--;
                }
                if (brightness_step == 0 || brightness_step == brightness_step_number) {
                  brightness_decreasing = !brightness_decreasing;
                }
          - addressable_lambda:
              name: "Success"
              update_interval: 10ms
              lambda: |-
                static uint8_t brightness_step = 0;
                static bool brightness_decreasing = true;
                static uint8_t brightness_step_number = 10;
                static uint8_t counter = 0;
                if (initial_run) {
                  brightness_step = 0;
                  brightness_decreasing = true;
                  counter = 0;
                }
                Color error_color(0, 255, 0);
                for (int i = 0; i < 24; i++) {
                  it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
                }
                if (brightness_decreasing) {
                  brightness_step++;
                } else {
                  brightness_step--;
                }
                if (brightness_step == 0 || brightness_step == brightness_step_number) {
                  brightness_decreasing = !brightness_decreasing;
                }
    
          - addressable_lambda:
              name: "Warning"
              update_interval: 10ms
              lambda: |-
                static uint8_t brightness_step = 0;
                static bool brightness_decreasing = true;
                static uint8_t brightness_step_number = 10;
                static uint8_t blink_count = 0;  // New counter for blink cycles
                if (initial_run) {
                  brightness_step = 0;
                  brightness_decreasing = true;
                  blink_count = 0;
                }
                Color error_color(255, 0, 0);
                if (blink_count < 5) {  // Only blink 5 times
                  for (int i = 0; i < 24; i++) {
                    it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
                  }
                  if (brightness_decreasing) {
                    brightness_step++;
                  } else {
                    brightness_step--;
                  }
                  if (brightness_step == 0 || brightness_step == brightness_step_number) {
                    brightness_decreasing = !brightness_decreasing;
                    if (brightness_step == 0) {  // Completed one blink cycle
                      blink_count++;
                    }
                  }
                } else {
                  // Turn off LEDs after 5 blinks
                  for (int i = 0; i < 24; i++) {
                    it[i] = Color(0, 0, 0);
                  }
                }
          - pulse:
              name: "Fast Pulse"
              transition_length: 100ms
              update_interval: 100ms
              min_brightness: 50%
              max_brightness: 100%
    
          - addressable_lambda:
              name: "Timer Ring"
              update_interval: 10ms
              lambda: |-
                static uint8_t brightness_step = 0;
                static bool brightness_decreasing = true;
                static uint8_t brightness_step_number = 10;
                if (initial_run) {
                  brightness_step = 0;
                  brightness_decreasing = true;
                }
                auto light_color = id(led_ring).current_values;
                Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                      light_color.get_blue() * 255);
                Color muted_color(255, 0, 0);
                for (int i = 0; i < 24; i++) {
                  it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
                }
                if ( id(master_mute_switch).state ) {
                  it[3] = muted_color;
                  it[9] = muted_color;
                }
                if (brightness_decreasing) {
                  brightness_step++;
                } else {
                  brightness_step--;
                }
                if (brightness_step == 0 || brightness_step == brightness_step_number) {
                  brightness_decreasing = !brightness_decreasing;
                }
          - addressable_lambda:
              name: "Timer Tick"
              update_interval: 100ms
              lambda: |-
                auto light_color = id(led_ring).current_values;
                Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                      light_color.get_blue() * 255);
                Color muted_color(255, 0, 0);
                auto timer_ratio = 24.0f * id(first_active_timer).seconds_left / max(id(first_active_timer).total_seconds , static_cast<uint32_t>(1));
                uint8_t last_led_on = static_cast<uint8_t>(ceil(timer_ratio)) - 1;
                for (int i = 0; i < 24; i++) {
                  float brightness_dip = ( i == id(global_led_animation_index) % 24 && i != last_led_on ) ? 0.9f : 1.0f ;
                  if (i <= timer_ratio) {
                    it[i] = color * min (255.0f * brightness_dip * (timer_ratio - i) , 255.0f * brightness_dip) ;
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
                if (id(master_mute_switch).state) {
                  it[2] = Color::BLACK;
                  it[3] = muted_color;
                  it[4] = Color::BLACK;
                  it[8] = Color::BLACK;
                  it[9] = muted_color;
                  it[10] = Color::BLACK;
                }
                id(global_led_animation_index) = (24 + id(global_led_animation_index) - 1) % 24;
          - addressable_lambda:
              name: "Remote Timer tick"
              update_interval: 100ms
              lambda: |-
                auto light_color = id(led_ring).current_values;
                Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                      light_color.get_blue() * 255);
                Color muted_color(255, 0, 0);
                float total = max((float) id(remote_timer_total_seconds), 1.0f);
                float left = max((float) id(remote_timer_remaining_seconds), 0.0f);
                float timer_ratio = 24.0f * left / total;
                uint8_t last_led_on = static_cast<uint8_t>(ceil(timer_ratio)) - 1;
                for (int i = 0; i < 24; i++) {
                  float brightness_dip = ( i == id(global_led_animation_index) % 24 && i != last_led_on ) ? 0.9f : 1.0f ;
                  if (i <= timer_ratio) {
                    it[i] = color * min (255.0f * brightness_dip * (timer_ratio - i) , 255.0f * brightness_dip) ;
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
                if (id(master_mute_switch).state) {
                  it[2] = Color::BLACK;
                  it[3] = muted_color;
                  it[4] = Color::BLACK;
                  it[8] = Color::BLACK;
                  it[9] = muted_color;
                  it[10] = Color::BLACK;
                }
                id(global_led_animation_index) = (24 + id(global_led_animation_index) - 1) % 24;
          - addressable_rainbow:
              name: "Rainbow"
              width: 24
          - addressable_lambda:
              name: "Tick"
              update_interval: 333ms
              lambda: |-
                static uint8_t index = 0;
                Color color(255, 0, 0);
                if (initial_run) {
                  index = 0;
                }
                for (int i = 0; i < 24; i++) {
                  if (i <= index ) {
                    it[i] = Color::BLACK;
                  } else {
                    it[i] = color;
                  }
                }
                index = (index + 1) % 24;
          - addressable_lambda:
              name: "Flashing XMOS"
              update_interval: 333ms
              lambda: |-
                static uint8_t index = 0;
                Color color(0, 0, 255);
                if (initial_run) {
                  index = 0;
                }
                for (int i = 0; i < 24; i++) {
                  if (i <= index ) {
                    it[i] = Color::BLACK;
                  } else {
                    it[i] = color;
                  }
                }
                index = id(global_led_animation_index) % 24;
          - addressable_lambda:
              name: "Factory Reset Coming Up"
              update_interval: 500ms
              lambda: |-
                static uint8_t index = 0;
                Color color(255, 0, 0);
                if (initial_run) {
                  index = 0;
                }
                for (int i = 0; i < 24; i++) {
                  if (i <= index ) {
                    it[i] = color;
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
                index = (index + 1) % 24;
          - addressable_lambda:
              name: "Jack Plugged"
              update_interval: 40ms
              lambda: |-
                  static uint8_t index = 0;
                  if (initial_run) {
                    index = 0;
                  }
                  auto light_color = id(led_ring).current_values;
                  Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                        light_color.get_blue() * 255);
                  if (index <= 12) {
                    for (int i = 0; i < 24; i++) {
                      if (i == index) {
                        it[i] = color;
                      } else if (i == (24 - index) % 24) {
                        it[i] = color;
                      } else {
                        it[i] = Color::BLACK;
                      }
                    }
                  }
                  index = (index + 1);
          - addressable_lambda:
              name: "Jack Unplugged"
              update_interval: 40ms
              lambda: |-
                  static uint8_t index = 0;
                  if (initial_run) {
                    index = 0;
                  }
                  auto light_color = id(led_ring).current_values;
                  Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                        light_color.get_blue() * 255);
                  if (index <= 12) {
                    for (int i = 0; i < 24; i++) {
                      if (i == 12 - index) {
                        it[i] = color;
                      } else if (i == (12 + index) % 24) {
                        it[i] = color;
                      } else {
                        it[i] = Color::BLACK;
                      }
                    }
                  }
                  index = (index + 1);
    
    script:
      # Master script controlling the LEDs, based on different conditions : initialization in progress, wifi and api connected and voice assistant phase.
      # For the sake of simplicity and re-usability, the script calls child scripts defined below.
      # This script will be called every time one of these conditions is changing.
      - id: control_leds
        then:
          - lambda: |
              id(check_if_timers_active).execute();
              if (id(is_timer_active)){
                id(fetch_first_active_timer).execute();
              }
              if (id(xmos_flashing_state) > 0) {
                id(control_leds_xmos_flasher_state_update).execute();
              } else if (id(improv_ble_in_progress)) {
                id(control_leds_improv_ble_state).execute();
              } else if (id(init_in_progress)) {
                id(control_leds_init_state).execute();
              } else if (!id(wifi_id).is_connected() || !id(api_id).is_connected()){
                id(control_leds_no_ha_connection_state).execute();
              } else if (id(volume_buttons_touched)) {
                id(control_leds_volume_buttons_touched).execute();
              } else if (id(btn_action).state) {
                id(control_leds_action_button_touched).execute();
              } else if (id(jack_plugged_recently)) {
                id(control_leds_jack_plugged_recently).execute();
              } else if (id(jack_unplugged_recently)) {
                id(control_leds_jack_unplugged_recently).execute();
              } else if (id(warning)) {
                id(control_leds_warning).execute();
              } else if (id(timer_ringing).state) {
                id(control_leds_timer_ringing).execute();
              } else if (id(remote_timer_running)) {
                id(control_leds_remote_timer_ticking).execute();
              } else if (id(voice_assistant_phase) == ${voice_assist_waiting_for_command_phase_id}) {
                id(control_leds_voice_assistant_waiting_for_command_phase).execute();
              } else if (id(voice_assistant_phase) == ${voice_assist_listening_for_command_phase_id}) {
                id(control_leds_voice_assistant_listening_for_command_phase).execute();
              } else if (id(voice_assistant_phase) == ${voice_assist_thinking_phase_id}) {
                id(control_leds_voice_assistant_thinking_phase).execute();
              } else if (id(voice_assistant_phase) == ${voice_assist_replying_phase_id}) {
                id(control_leds_voice_assistant_replying_phase).execute();
              } else if (id(voice_assistant_phase) == ${voice_assist_error_phase_id}) {
                id(control_leds_voice_assistant_error_phase).execute();
              } else if (id(voice_assistant_phase) == ${voice_assist_not_ready_phase_id}) {
                id(control_leds_voice_assistant_not_ready_phase).execute();
              } else if (id(is_timer_active)) {
                id(control_leds_timer_ticking).execute();
              } else if (id(master_mute_switch).state) {
                id(control_leds_muted_or_silent).execute();
              } else if (id(external_media_player).volume == 0.0f || id(external_media_player).is_muted()) {
                id(control_leds_muted_or_silent).execute();
              } else if (id(voice_assistant_phase) == ${voice_assist_idle_phase_id}) {
                id(control_leds_voice_assistant_idle_phase).execute();
              }
    
      # Script executed during Improv BLE
      # Warm White Twinkle
      - id: control_leds_improv_ble_state
        then:
          - light.turn_on:
              brightness: 66%
              red: 100%
              green: 89%
              blue: 71%
              id: voice_assistant_leds
              effect: "Twinkle"
    
      # Script executed during initialization
      # Blue Twinkle if Wifi is connected, Else solid warm white
      - id: control_leds_init_state
        then:
          - if:
              condition:
                wifi.connected:
              then:
                - light.turn_on:
                    brightness: 66%
                    red: 9.4%
                    green: 73.3%
                    blue: 94.9%
                    id: voice_assistant_leds
                    effect: "Twinkle"
              else:
                - light.turn_on:
                    brightness: 33%
                    red: 100%
                    green: 89%
                    blue: 71%
                    id: voice_assistant_leds
                    effect: "none"
    
      # Script executed when the device has no connection to Home Assistant
      # Red Twinkle (This will be visible during HA updates for example)
      - id: control_leds_no_ha_connection_state
        then:
          - light.turn_on:
              brightness: 66%
              red: 1
              green: 0
              blue: 0
              id: voice_assistant_leds
              effect: "Twinkle"
    
      # Script executed when the voice assistant is idle (waiting for a wake word)
      # Nothing (Either LED ring off or LED ring on if the user decided to turn the user facing LED ring on)
      - id: control_leds_voice_assistant_idle_phase
        then:
          - light.turn_off: voice_assistant_leds
          - if:
              condition:
                light.is_on: led_ring
              then:
                light.turn_on: led_ring
    
      # Script executed when the voice assistant is waiting for a command (After the wake word)
      # Slow clockwise spin of the LED ring.
      - id: control_leds_voice_assistant_waiting_for_command_phase
        then:
          - light.turn_on:
              brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
              id: voice_assistant_leds
              effect: "Waiting for Command"
    
      # Script executed when the voice assistant is listening to a command
      # Fast clockwise spin of the LED ring.
      - id: control_leds_voice_assistant_listening_for_command_phase
        then:
          - light.turn_on:
              brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
              id: voice_assistant_leds
              effect: "Listening For Command"
    
      # Script executed when the voice assistant is thinking to a command
      # The spin stops and the 2 LEDs that are currently on and blinking indicating the commend is being processed.
      - id: control_leds_voice_assistant_thinking_phase
        then:
          - light.turn_on:
              brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
              id: voice_assistant_leds
              effect: "Thinking"
    
      # Script executed when the voice assistant is thinking to a command
      # Fast anticlockwise spin of the LED ring.
      - id: control_leds_voice_assistant_replying_phase
        then:
          - light.turn_on:
              brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
              id: voice_assistant_leds
              effect: "Replying"
    
      # Script executed when the voice assistant is in error
      # Fast Red Pulse
      - id: control_leds_voice_assistant_error_phase
        then:
          - light.turn_on:
              brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
              red: 1
              green: 0
              blue: 0
              id: voice_assistant_leds
              effect: "Error"
          - delay: 2s
          - lambda: id(volume_buttons_touched) = false;
          - script.execute: control_leds
    
      # Script executed when the voice assistant requires user action
      # 5 Fast Red Pulses
      - id: control_leds_warning
        then:
          - light.turn_on:
              brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
              red: 1
              green: 0
              blue: 0
              id: voice_assistant_leds
              effect: "Warning"
          - delay: 2s
          - lambda: id(warning) = false;
          - script.execute: control_leds
    
      # Script executed when the voice assistant is muted or silent
      # The LED next to the 2 microphones turn red / one red LED next to the speaker grill
      - id: control_leds_muted_or_silent
        then:
          - light.turn_on:
              brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
              id: voice_assistant_leds
              effect: "Muted or Silent"
    
      # Script executed when the voice assistant is not ready
      - id: control_leds_voice_assistant_not_ready_phase
        then:
          - light.turn_on:
              brightness: 66%
              red: 1
              green: 0
              blue: 0
              id: voice_assistant_leds
              effect: "Twinkle"
    
      # Script executed when the volume button is touched
      # A number of LEDs turn on indicating a visual representation of the volume of the media player entity.
      - id: control_leds_volume_buttons_touched
        then:
          - light.turn_on:
              brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
              id: voice_assistant_leds
              effect: "Volume Display"
    
      # Script executed when the jack has just been unplugged
      # A ripple effect
      - id: control_leds_jack_unplugged_recently
        then:
          - light.turn_on:
              brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
              id: voice_assistant_leds
              effect: "Jack Unplugged"
    
      # Script executed when the jack has just been plugged
      # A ripple effect
      - id: control_leds_jack_plugged_recently
        then:
          - light.turn_on:
              brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
              id: voice_assistant_leds
              effect: "Jack Plugged"
    
      # Script executed when the center button is touched
      # The complete LED ring turns on
      - id: control_leds_action_button_touched
        then:
          - light.turn_on:
              brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
              id: voice_assistant_leds
              effect: "Action Button Touched"
    
      # Script executed when the timer is ringing, to control the LEDs
      # The LED ring blinks.
      - id: control_leds_timer_ringing
        then:
          - light.turn_on:
              brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
              id: voice_assistant_leds
              effect: "Timer Ring"
    
      # Script executed when the timer is ticking, to control the LEDs
      # The LEDs shows the remaining time as a fraction of the full ring.
      - id: control_leds_timer_ticking
        then:
          - light.turn_on:
              brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
              id: voice_assistant_leds
              effect: "Timer tick"

      # Script executed when the remote timer is ticking, to control the LEDs.
      - id: control_leds_remote_timer_ticking
        then:
          - light.turn_on:
              brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
              id: voice_assistant_leds
              effect: "Remote Timer tick"
    
      # Script executed when the timer is ticking, to control the LEDs
      # The LEDs shows the remaining time as a fraction of the full ring.
      - id: control_leds_xmos_flasher_state_update
        then:
          - if:
              condition:
                lambda: 'return id(xmos_flashing_state) == 1;'
              then:
                - light.turn_on:
                    brightness: !lambda return .6f ;
                    id: voice_assistant_leds
                    effect: "Flashing XMOS"
              else:
                - light.turn_on:
                    brightness: !lambda return .6f ;
                    id: voice_assistant_leds
                    effect: !lambda 'return id(xmos_flashing_state) == 3 ? "Error" : "Success" ;'
                - delay: 1s
                - light.turn_off:
                    id: voice_assistant_leds

  ## OPTIONAL COMPONENTS
  # Optional blocks that were previously separate package files and are not included
  # in this single-file config:
  # - mmwave_ld2410
  # - mmwave_ld2450
  # - debug
  # - developer

http_request:

safe_mode:

status_led:
  pin:
    number: GPIO45
    ignore_strapping_warning: true

satellite1:
  id: satellite1_id
  spi_id: spi_0
  cs_pin: GPIO10
  data_rate: 8000000
  spi_mode: MODE3
  xmos_rst_pin: GPIO4

  on_xmos_no_response:
    then:
      - text_sensor.template.publish:
          id: xmos_firmware_version_text
          state: !lambda 'return id(satellite1_id).status_string();'

  on_xmos_connected:
    then:
      - text_sensor.template.publish:
          id: xmos_firmware_version_text
          state: !lambda 'return id(satellite1_id).status_string();'

memory_flasher:
  - platform: satellite1
    id: xflash
    embed_flash_image:
      image_version: ${xmos_fw_version}
      image_file: https://raw.githubusercontent.com/FutureProofHomes/Documentation/refs/heads/main/assets/firmware/xmos/${xmos_fw_version}/satellite1_firmware_fixed_delay.factory.bin
      md5_file: https://raw.githubusercontent.com/FutureProofHomes/Documentation/refs/heads/main/assets/firmware/xmos/${xmos_fw_version}/satellite1_firmware_fixed_delay.factory.md5

    on_flashing_start:
      then:
        - lambda: id(xmos_flashing_state) = 1;
        - script.execute: control_leds

    on_progress_update:
      then:
        - lambda: id(global_led_animation_index) = id(xflash).flashing_progress * 24 / 100;
        - script.execute: control_leds

    on_flashing_success:
      then:
        - logger.log: "success called"
        - lambda: id(xmos_flashing_state) = 2;
        - script.execute: control_leds
        - lambda: id(xmos_flashing_state) = 0;
        - if:
            condition:
              lambda: |-
                return id(pd_fusb302b).contract_voltage >= 9;
            then:
              - tas2780.activate:
                  mode: 2
            else:
              - tas2780.activate:
                  mode: 0

    on_flashing_failed:
      then:
        - logger.log: "failed called"
        - lambda: id(xmos_flashing_state) = 3;
        - script.execute: control_leds
        - lambda: id(xmos_flashing_state) = 0;

    on_erasing_done:
      then:
        - if:
            condition:
              lambda: return id(factory_reset_requested);
            then:
              - button.press: factory_reset_button
